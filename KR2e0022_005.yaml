  - {type: page-break, offset: 0, content: '', id: KR2e0022_WYG_005-1a, image: WYG0410/WYG0410-0593c.png}
body:
  text: 額訥特珂克土伯特蒙古汗等源流朱葛住南省三年與彼處八十八萬漢人固結盟好乃摺奏云遵汗之旨已徴收賦稅携帶前來閽人見有財帛不勝欣悅使之入奏云滿載九萬車財帛而至檢查賫至之物據稱前三萬車內裝載各色珍寶財帛中三萬車內裝載各項器械後三萬車內裝載各品飲食之物及卸看前三萬車內載之物實係珍寶財帛隨後之六萬車內則係披堅執鋭之兵並炮三尊如蠟燭裹飾一同裝載詭云恐車內裝載之物一時不能卸完置此蠟燭以備夜間然照遂將蠟燭俱已點灼先已約定燃至炮線聞炮聲則車內伏兵即發至是前三萬車中之物將次卸完炮聲一振兵丁突出攻擊衆皆驚潰無一人能敵於是汗悟前夢乃袖玉璽携福晉皇子出奔並携同阿爾拉特之伊拉呼丞相阿喇瑪之布哈丞相哈薩爾之後嗣多古勒和巴圖爾台吉等七人力戰而出此烏哈噶圖汗於癸丑年即位在位三十六年嵗次戊申年五十一嵗因好諂侫以致建都之岱都地方一旦墮於凶頑之詭計永失統業自威力青吉斯汗降生之壬午年起凡二百零七年嵗次己酉青吉斯汗即位至戊申凡一百八十年蒙古汗等傳位共一十五世自是汗由古北口出亡感悔而歌曰以諸寶裝嚴之大岱都城以應時納涼之尚都海綳古爾都城與我烈祖避暑之尚都沙喇塔拉際此戊申以致敗亡遂失大統且九色寶物裝嚴之大岱都城執掌九十九政之尚都海綳澤溥衆生道拯黎庶一統君主之赫赫名譽晨起登高眺望則清光燦爛有時前後觀覽則威儀赫奕留憩於此雖厯冬夏而無鬱悶又額爾克圖徹辰汗創立之寶貝岱都祖宗安居之大岱都城並撫有汗衆宰桑以及所屬民人之衆多乃不聼伊拉呼丞相之諫者是我之遺恨也信任叛去之朱葛者是我之愚昧也誤殺烏哈圖托克托噶太師逐去寶異尊上喇嘛者是我之罪愆也君汗之名譽可惜究之大可惜者際此升平之時呼必勒罕徹辰汗百計經營而得此駢集福祉之岱都城以豫狂惑而失於漢人朱葛之手愚頑之名我多衮特穆爾其難辭矣歌聲既哀繼之以泣方大亂時各處轉戰蒙古人等四十萬內惟脫出六萬其三十四萬俱陷於敵於是先後脫出之六萬人聚集於克哷倫河邊界起造巴爾斯濶坦城居住嵗次庚戌年五十三嵗殁子阿裕錫哩達喇汗戊寅年生嵗次辛亥年三十四嵗即位在位八年嵗次戊午年四十一嵗歿弟特古斯特穆爾汗壬午年生嵗次己未年三十八嵗即位在位十年嵗次戊辰年四十七嵗歿生子恩克卓里克圖汗額勒伯克尼古埒蘇克齊汗哈爾古楚克都古楞特穆爾鴻台吉弟兄共三人恩克卓里克圖汗己亥年生嵗次己巳年三十一嵗即位在位四年嵗次壬申年三十四嵗歿弟額勒伯克汗辛丑年生嵗次癸酉年三十三嵗即位舉國上尊號稱為額勒伯克尼古埒蘇克齊汗忽被鬼怪所迷一日於雪內射一兔見血點落於雪上乃曰安得有面色潔白似此雪顴頰紅艷似此血之婦人乎衛喇特扎哈明安之浩海達裕答云汗之弟哈爾古楚克都古楞洪台吉之妻鄂勒哲依圖洪郭斡拜濟顏色較此尤為都麗汗云浩海達裕爾果能愜我意使彼與我一見我即令爾為丞相管轄四衛喇特浩海達裕乃伺都古楞鴻台吉出獵後往見洪郭斡拜濟説云奉汗之旨謂爾都麗衆皆稱異欲來爾家看視拜濟大驚云天地豈有混淆之理乎汗之貴重豈有覷弟婦之理乎弟哈爾古楚克鴻台吉已與之乎兄豈為黑犬乎浩海達裕以其言盡行具奏汗怒截殺其弟於路而納懷孕三月之弟婦弟哈爾古楚克鴻台吉癸卯年生嵗次己卯年三十七嵗殞命逮後汗出放鷹浩海達裕為請名號備宴以至在外坐候汗駕洪郭斡拜濟聞知遣哈爾古楚克之僕人多克新沙喇謂之曰爾為何坐於外可入我室中候汗乃喚入大加禮敬洪郭斡拜濟以奶油和奶酒盛於銀杯內云爾自卑汚致我於尊榮賤軀已為貴體以稱拜濟之人而為伯竒太后由台吉之拜濟得為汗之福晉我深感爾恩主上亦諒知此大恩今特把盞以酬爾之德耳浩海受而飲之不覺醉仆於地拜濟於是將浩海置之椅上採已髮一縷擲之各處仍自毁其面傳集庫爾新之大衆看視遂遣哈爾古楚克之僕人多克新沙喇迎往奏汗汗至見其背坐而泣問云爾何為而泣乃將酬謝浩海之言一一告知且云伊飲酬酒一杯醉後肆言因褻我不從即如此傷我浩海一聞此言急起乘馬遁去汗云觀浩海之遁斯言誠然矣遂追去浩海拒戰將汗小指射斷當將浩海圍住擒殺交蘇尼特之旺沁太保剝取浩海之皮給與拜濟拜濟尚不愜意既吮汗小指之血又以人皮何似取而觀之併餂浩海皮上之油乃曰既得吮懷蓄惡念汗之血並餂獻讒佞口浩海之油雖係婦人夫仇已報今即就死無憾矣汗其速令我回汗慕洪拜濟之色並不加怒反向浩海之子巴圖拉云誤殺爾父矣遂降庫伯衮岱大福晉所生之薩穆爾公主妻之授為丞相令管四衛喇特時衛喇特克哷古特之烏格齊哈什哈聞之云汗政治不端殺弟哈爾古楚克鴻台吉以弟婦洪拜濟為福晉淫虐亂法復被拜濟所欺殺臣浩海以有此恥乃既有我在而令我屬人巴圖拉管轄四衛喇特耶不勝憤怒汗聞之與壻巴圖拉丞相議殺烏格齊哈什哈詎庫伯衮岱大福晉致信於烏格齊哈什哈烏格齊哈什哈即乘馬而來既弒額勒伯克汗乃娶鄂勒哲依圖洪拜濟為妻蒙古人衆大半降之額勒伯克汗癸酉年即位在位七年嵗次己卯年三十九嵗殺哈爾古楚克甫四月即於是年為烏格齊哈什哈所弒汗占鄂勒哲依圖洪拜濟為福晉時已懷孕三月及烏格齊哈什哈娶時懷孕已七月又三月嵗次庚辰生一子取名阿寨烏格齊哈什哈愛養如己子而巴圗拉丞相復令阿薩特之子烏格德勒庫負筐拾糞取負筐之義命名曰阿嚕克台以供使役自是與蒙古人衆不相能矣額勒伯克汗之長子琨特穆爾丁巳年生嵗次庚辰年二十四嵗即位在位三年嵗次壬午年二十六嵗歿無子弟額勒錐特穆爾己未年生嵗次癸未年二十五嵗即位在位八年嵗次庚寅年三十二嵗歿子德勒伯克汗乙亥年生嵗次辛卯年十七嵗即位在位五年嵗次乙未年二十一嵗歿是年乙未烏格齊哈什哈懷記前仇殺浩海達裕之子巴圖拉丞相由是四衛喇特前往會盟適有三人而回路遇阿薩特之阿嚕克台拾糞問云大人會盟之事若何三人譏之云墨爾根項負繩纜而為大統憂勞且笑曰今已擊讒佞浩海之皮阿寨台吉稱汗名阿嚕克台者為太師大興政治矣逮三人去後阿嚕克台取糞筐置於地云此非若輩之言也蓋天命耳我乃屬下之人於我何有惟阿寨台吉乃天子之裔惟天神鑒之而已乃向天叩拜維時烏格齊哈什哈已死烏格齊之子額色庫丁卯年生嵗次乙未年二十九嵗即位娶巴圖拉丞相之女薩穆爾稱為額色庫汗乃令鄂勒哲依圖洪拜濟阿寨台吉母子及阿薩特之阿嚕克台太師三人於額色庫汗家中使役額色庫汗在位十一年嵗次乙巳年三十九嵗歿由是薩穆爾福晉懷記烏格齊哈什哈作惡之仇將鄂勒哲依圖洪拜濟阿寨台吉阿嚕克台太師三人匿而出之遣往母家蒙古地方額色庫汗歿後額爾克徹古特人衆大亂薩穆爾公主曾向其父極力叩請以為此際正可用兵其子巴噶穆聞之云母現有母家他人何得出此言耶其母畏懼遂無語其時科爾沁烏濟金諾延之子阿岱台吉已占據前所餘剩蒙古人衆及三人至彼盡述公主之言阿岱台吉係丙辰年生嵗次庚寅年三十五嵗携鄂格德依圖洪拜濟即君位與阿嚕克台以太師名號阿岱汗阿寨台吉阿嚕克台太師三人為首加兵於濟勒滿汗征伐四衛喇特俘虜巴圗拉丞相之子巴噶穆既至阿寨台吉云公主姊曾加惠於我等今釋放此子以報之何如阿嚕克台太師云狼子不可豢敵嗣不可育昔放出我等時此子曾有惡言阿岱汗以阿嚕克台之言為然遂將巴噶穆羈留阿嚕克台太師謂之曰昔日爾父巴圖拉丞相曾令我負筐拾糞呼為阿嚕克台以供使役今日所值誠如日月旋轉今將昔時爾父之仇即報之於爾因取覆於釡中之義命名曰脫歡役於家內乃阿嚕克台太師之妻格哷勒阿哈念其係公主之子甚憐之一日格哷勒阿哈與之櫛髮適蒙郭勒津之蒙克拜往看見之曰阿哈與其櫛伊之髮辮何如閹之為當言訖而去逮後薩穆爾公主親來懇求太師將脫歡帶回脫歡於四衛喇特為首人衆之前告之曰今蒙古等即如我從前之亂此時若用兵必能取勝薩穆爾公主云此小兒蓋因已身受困為此復仇之言耳何必作惡諫之不聽兵出正遇阿岱汗行圍阿岱汗令賽穆沁薩勒穆沁二衛喇特佩帶插梅針箭之撒袋自佩插四枝大尖披箭之撒袋以獵其時四衛喇特之台噶特四人叛去汗用撒袋內之四枝大尖披箭將四人射仆敗去藏於汗之亭內汗既回徒手並無器械遂被弒脫歡太師乘密爾繖之黃色良馬將亭繞走三次云爾身係索多室從白色可耳我則索多之後裔脫歡也都沁都爾本二部落人衆皆曰此乃聖主非僅為蒙古等之君乃統據五翁格四郭囉勒之汗玉皇上帝之子也報應甚速今觀爾之言語動作甚屬背謬當作速叩禱聖主以求救命不之聽而曰我自身性命向誰求乞今衆蒙古等俱為我有其照從前蒙古汗等尊上汗號耳遂致祭於汗回時驟聞上之金撒袋錚然有聲近侍之人見中壺內所插挑逺箭一枝顫動又見脫歡太師鼻口流血正驚駭間大衆復見太師血浸透衣兩琵琶骨間正如箭痕浮露於外而中壺內之挑逺箭一枝帶有血迹其都沁都爾本二部落人等驚惶以為上不悅所致云隨召其子額森至囑之曰丈夫中之丈夫索多可謂出類拔萃惜乎不能保身因涉險尋母索戴為汗所害我已芟盡爾之芒刺所餘者僅蒙郭勒津之蒙克拜而已言訖即殁阿岱汗庚午年生嵗次丙午年三十七嵗即位在位十三年嵗次戊午年四十九嵗為脫歡太師所弒阿岱汗與脫歡太師二人同年而殁脫歡太師之子額森丁亥年生本年戊午年三十二嵗即君位遵其父遺言殺蒙郭勒津之蒙克拜本日帶領都沁都爾本二部落行兵於漢地額森汗夜夢伊身轉生聞有人云誰人養此有人答以除阿索特阿嚕克台太師之子阿里瑪丞相之妻格哷勒阿哈之外誰復扶養耶遂令所屬詳解此夢衛喇特之巴噶圖特錫賚汗必錫古勒解之曰可擒獲大明汗付與阿蘇特之阿里瑪丞相由是加兵於大同地方擒獲大明正統汗謂應夢兆交與阿里瑪丞相留養於六千烏濟葉特之高阜和暖地方及歸令云誰若將捉獲大明汗之事先我告知我母我必殺之至家抱其母云重生我矣母問爾試言擒獲大明汗情形詰問此係何人所言答以永謝布之布庫索爾遜喜極所言額森汗不聽其母勸止竟殺布庫索爾遜挂於樹間於是蒙古衛喇特之酋長共相議論以為此次出兵之前殺一人及撤兵回又殺一人屠戮是務未免不祥又屬下蒙古等議云前此既殺蒙克拜今又殺索爾遜由此觀之必將盡殺我蒙古人等矣由是紛紛背叛散離大半阿賽台吉生三子長子岱總台吉生於壬寅年次子阿噶巴爾濟台吉生於癸卯年幼子滿多固勒台吉生於丙午年嵗次己未岱總年十八嵗即位阿噶巴爾濟年十七嵗令為濟農滿多固勒年十四嵗弟兄三人督率行兵四衛喇特迎戰於吐魯畨之哈喇地方衆議欲奪大隊纛頂務須選派勇士於是蒙古派烏爾哈特之巴圖魯錫古蘇特衛喇特派布里雅特之巴圖魯圭林齊是二人彼此詢問名號之後乃云我二人於太平時為友曾記一日在此地坐飲約云若都沁都爾本二部落起釁興戎除我二人之外誰復肯出彼時我二人相遇其如之何哉圭林齊云我善射能穿爾之盔及甲錫古蘇特亦云我善砍能劈爾之頂及踵至是巴圗魯錫古蘇特乃服重鎧而出遙呼曰善射之人爾試射之巴圖魯圭林齊遂先射之將錫古蘇特之重鎧射透稍創軀體緣側身於鞍後躲過遂復前進砍之竟至圭林齊衣襟因日落天晚約詰朝再戰是夜相對扎營四衛喇特甚懼議云其降之耶抑何為耶特凌古斯之阿卜都拉徹辰云蒙古人見識惡我試往誘之若我身能回即尊顯我我若死可善待我後裔言訖遂往以為岱總汗聰智必能覺察阿噶巴爾濟濟農愚昧尚可計取其子哈爾固楚克有威可畏而材智過人何可用計賺之耶惟聽命而已於是至濟農之室説之曰濟農爾若獨取則我等俱欲順從若汗與爾二人分取將何所歸附與為爾等所制不若死於鋒鏑之為快今額森太師遣我前來聞汝之兄汗輕爾過甚爾兄一人坐食從不分惠與弟故乘夜密商之耳濟農云阿卜都拉徹辰之言確而有理汗兄授我為濟農差往西圖們之時止與一黑色跛足兒駝今於野地又將我僕人阿勒噶齊特察罕奪去我何故復視彼為兄而助之乎今與四衛喇特會合以避彼可耳其子哈爾固楚克諫云嘗聞人若狎匿戚匪則將下流親護同胞則能發達親護嶽父母則人譏之親護君上則人賢之額森太師雖我之嶽翁我則為父之名譽而言與其倚仗外人不若殺此侵我讎人之為愈也濟農云孺子安得妄言干瀆是夜遂與阿卜都拉徹辰遣索倫之和托巴噶輝察固特之蒙克二人會合四衛喇特次早領衛喇特兵來戰其兄岱總汗雖奮力以擊而兵衆紛亂竟不能軍汗云敗矣異哉巴圖魯錫固蘇特叛矣為騰格哩因圗古里克阿卜都拉徹辰所欺矣阿噶巴爾濟濟農凶頑負恩叛逆惜哉名也岱總汗乃騎塔竒淡黃馬敗走奔往肯特汗山渡克哷倫河途遇郭爾羅斯之徹卜登緣從前曾將徹卜登之女阿勒塔噶勒沁出離令回母家此行正與讎人遇徹卜登欲殺之女諫曰從前我之過若害及博爾濟錦罪莫大矣今彼困頓跋涉若加保護將來自必有益不聽殺之自己未至壬申在位一十四年年三十一嵗終於徹卜登之手由是阿噶巴爾濟濟農會同四衛喇特告以咋吾強悍之子哈爾固楚克曾有與其倚仗外人何若逐出殺之以復前仇之語我以威嚇之而止衛喇特之衆蒙古等聞之私相譏誚云此濟農非真濟農乃瑪喇勒額勒濟根應食其肉者也阿噶巴爾濟濟農額勒濟根之稱由此始矣逮後四衛喇特等密議云濟農為人無異畜類若哈爾固楚克台吉乃將來必能復讎之人活狐安得繫於鞍上乎我等與都沁都爾本結仇至深伊等若懷記此讎何得養育伊等耶遂欲殺其父子額森汗袒護其壻云云伊父雖有過愆然逐其兄而與我合若論此子尚係好人可以為友何必殺之乃阿卜都拉徹辰告於衆曰逐父兄而訟己子不慈不友似此人我等何可留之若養其子則尤不可其人之險言語之狠豈未聞之乎衆皆然之因相計議令阿卜都拉徹辰往告濟農云都沁都爾本兩部落已為屬下今請濟農為我等汗即將濟農之號賞給額森濟農云爾等之言甚是即照所言而行伊等既出哈爾固楚克台吉諫云上天日月二也下土汗濟農二也索岱之後嗣伊等之太師丞相二也奈何以已之名與人耶斥責其非不聽哈爾固楚克又云原無與汗父抗言之理乃為汗之名譽大統而言惜乎豈自欲隕其黔首乎蓋欲所屬蒙古人衆底於敗亡耳遂出由是聚集都沁都爾本二部落奉阿噶巴爾濟即汗位以額森太師為濟農詎四衛喇特設計聨絡二大室於後室內掘一大穴覆之以氊大備筵宴遣利口之徹辰往奏濟農以都沁都爾本二部落因濟農已為汗又賞給我等四額爾克楚特濟農之號大施恩惠今甥濟農額森備筵以賀遣令來請舅汗汗許之往及汗往臨詭云隨來之諸兄弟等各帶二人隨入我等逐一把盞遂將大衆置之逺地令汗帶四人台吉等各帶二人隨入乃先作按人數算之狀及進衆大呼按次擒戮皆擲於後室所掘穴內其為羽翼之三十三人亦盡被殺戮哈爾固楚克台吉知覺密令僕人伊納克格爾前往偵看以室內並不見一人惟見後室束邊氊帷縫內流血之語告之哈爾固楚克台吉云謂之睡則睡矣乎謂之死其巳死矣乃帶伊納克格爾逃出適衛喇特遣勇士三十人往追遂匿於翁衮哈雅哈卜察該山有衛喇特之色勒必斯巴圖爾圖林等三人身穿重鎧登山而來伊納克格爾射透重鎧及其後二人皆滚仆嗣托爾郭特之察拉斯圖爾根服三層鎧甲持槍而上伊納克格爾云我非此人敵手台吉試射之台吉乃指其心窩射之直透三層鎧甲箭出背後察拉斯圖爾根既仆餘人竄去於是二人商議我等步行可往何處是夜伊納克格爾盜取額森汗名博郭喇哈卜繖黑馬名額爾默克錫爾噶沁線臉騍馬黑馬與台吉乘騎自乘錫爾噶騍馬以通瑪克汗珠齊之後嗣原係姻戚遂投往通瑪克地方適遇通瑪克之阿克蒙克富人台吉遂與彼同居諭令伊納克格爾往探額森太師存否都沁都爾本二部落人衆近狀若何探明以告若再有間暇往看我妻齊齊克如未適人即接來與我相見其時額森汗已即位占據都沁都爾本矣其後彼富人行圍驅有香獐十隻而至台吉赦其一餘皆殺之阿克蒙克之弟章錫蒙克變色以為大謬因射殺台吉維時台吉之僕人伊納克格爾既歸捉獲阿克蒙克牧馬之人詢之告以台吉被害情狀遂殺牧人取馬一羣往見齊齊克拜濟哈屯哈屯問其故哭訴云我台吉被通瑪克之人所殺將我折磨差使我今逃出來歸額森汗初齊齊克拜濟其父曾欲令其再適矢誓以未聞哈爾固楚克之死斷不適人懷孕七月與哈爾固楚克相離越三月本年壬申分娩其父額森汗云齊齊克若生女則留之若生男則殺之齊齊克聞之乃將其子之胞系掣縳臀後來看之人誤以為女而去其人既出齊齊克拜濟即將察哈爾之呼拉巴特鄂托克之鄂推媽媽之女置於搖車內前往薩穆爾公主媽媽處訴其故公主遂取其子命名巴延蒙克付與高麗之僧格勒都爾之妻哈喇克沁戴福晉乳哺養育後額森汗之孫欲殺此子薩穆爾公主媽媽謂之曰爾以其將來長成不知為何如人以為讎耳然既係我裔豈非爾之甥乎我子脫歡若在亦向我如此言乎額森之孫爾欲害我之孫乎怒以責之額森之孫懼默然而出又議以欲絶博爾濟錦之後媽媽不允今須背公主潛殺之伊納克格爾聞知告之公主公主云若有妥實之人可遣往蒙古地方伊納克格爾答以十三嵗時曾率領本旗效力於衛喇特之烏格特依太保彼以未嘗施惠於我為憾今我前去試探其言遂往見巴圖爾烏格特依謂之曰爾欲建功今齊齊克拜濟三嵗子額森欲殺之爾若告知公主將其子送往蒙古地方不但爾之一身以及爾之後世皆可為蒙古之巨擘矣烏格特依大保然其言往見公主訴云聞額森欲殺此子我願送往汝之母家公主喜甚謂之曰誠如汝言善無過於此者乃令衛喇特中明安之烏格特依太保喀喇沁蒙古之博賚太師薩爾塔郭勒之巴延岱墨爾根鴻吉喇特之額塞壘太保四人送往並有鄂羅郭特尋來助給口糧將伊女錫吉爾許與巴延蒙克台吉為妻公同保護遣令歸宗從此得安居矣彼時衛喇特右翼之阿拉克丞相左翼之特穆爾丞相二人前來告於額森汗云爾已為都沁都爾本二部落之汗矣今可將爾太師之號給與阿拉克丞相汗答以我未計及爾等出此言已與我子矣二人大恚云爾不過仗阿卜都拉徹辰之計巴圖拉巴圖爾之謀尼根德墨爾根之力承受蒙古之統耳豈以爾之善乎試看爾父子二人承受都沁都爾本之統言訖而去旋乘馬來戰額森汗敗走遂虜取妻子房産額森汗隻身逃出被布庫索爾遜之子巴郭擒殺肆諸庫克汗山樹上初額森汗擒獲大明正統汗有阿薩特之阿里瑪丞相將女摩羅給與正統汗命名察罕秀薩於家中使役自是本處旱潦災害遂多一夜察罕秀薩睡卧阿里瑪丞相之婢晨起擠取牛乳見察罕秀薩碗內現出霞光盤旋告知哈屯哈屯等互相傳説衆皆往看共相駭異以為此乃大有福之人自將伊擒獲以來頗為不利今復有此兆顯係非常之驗可將此人送回其國遂將大明正統汗送回並出六烏齊業特盛以大都之金銀大庫內難以負任之什物與之正統汗所娶蒙古地方之女名摩羅者生子朱泰薩為阿薩特之女塔勒拜之壻後聞額森汗已殁岱總汗續娶之福晉薩睦爾太后生一子名蒙古勒克哷青吉斯丙寅年生年七嵗貯於皮匱以馬負之伊母薩睦爾福晉持刀帶領騎牛乘馬及步兵出師由庫奎扎巴哈往伐四衛喇特大有俘獲撤兵而回即奉蒙古勒克哷青吉斯台吉即位維時七嵗稱為烏珂克圖汗撫綏所餘蒙古人衆嵗次癸酉年八嵗為多倫土默特之多郭朗台吉所害初岱總汗離異阿勒塔噶勒沁福晉時曾留其三嵗子係丁巳年生名摩倫台吉年十六嵗徹卜登謂係已甥收養之嵗次癸酉徹卜登既歿乃役於郭爾羅斯之和巴齊爾家緣本國忽有大警令筮人卜之云是爾等害博爾濟錦之報也因有其事衆甚畏懼遂遣克木齊古特之達噶泰郭爾羅斯之摩勒泰二人送往翁里郭特之摩里海王處於是所有人衆咸云國祚惟汝奠定之今奉汝即汗位遂備奎蘇圖黃馬插金杵牽至上前上是時年十七嵗即汗位其後高麗之和托卜罕來告摩倫汗以摩里海王與薩滿岱福晉計議欲伐爾已帶兵前來摩倫汗云伊與我相好今並無間隙何以交惡不信其言遣人往瞰之適見摩里海王在其家左近行圍揚起飛塵遂中道而回告稱實有塵迹揚起汗云果爾可即迎戰於是帶兵往迎汗乘馬之際和托卜罕忽逸去先告云摩倫汗欲殺爾以虜掠爾之僕役人衆業已興兵前來摩里海王以曾加惠於彼未嘗作惡何以搆兵於我耶不之信和托卜罕又以我言為虛試遣哨探人往看為之請摩里海王自思此誤傳耳欲親自登高眺望遂乘馬登眺果見蹤迹乃急裹甲向天禱云上天垂照君汗鑑察我曾大有禆益於汗之後裔今反以惡報我貴裔摩倫汗與鄙人摩里海王二人無論賢否為憎為愛惟君汗鑑之遂以少兵交戰竟戕及摩倫汗摩倫汗自癸酉至甲戌在位二載年十八嵗歿摩倫汗之蒙古徹福晉慟哭云使玷可惜之盛名使我離異君汗者和托卜罕也使盛業廢墜屬衆皆離異我君汗者和托卜罕也私向摩里海王獻讒以離間君汗者和托卜罕也摩里海王聞之為摩倫汗悼悔將和托卜罕割其舌而殺之摩倫汗無嗣歿後其叔阿寨台吉之衛喇特福晉所生一子名滿都古勒台吉者係丙午年生嵗次癸未年三十八嵗即位為烏珂克圖汗復仇興兵殺哈齊金之姻親多郭朗台吉收撫多倫土默特適於彼處邂逅表弟巴顔蒙克台吉錫吉爾拜濟二人與原送往之四大臣及伊嶽父同齎口糧而來滿都古勒汗甚為欣悅以為此可以續博爾濟錦之嗣矣遂給巴延蒙克博勒呼濟農名號滿都古勒汗為與摩倫汗復仇加兵於摩里海王時鄂囉郭特巴圖爾錫古蘇特之子烏訥博羅特王乘薩爾黨貉皮馬引導追殺之由是滿都古勒汗與博勒呼濟農兄弟二人和好其散佚之六萬人衆俱收撫矣滿都古勒汗有福晉二人大福晉乃衛喇特之伯格哷遜台吉之女稱伊克哈巴爾圖鐘金小福晉乃恩衮綽囉克拜特穆爾丞相之女稱滿都海徹辰福晉乃博勒呼濟農之哈里古沁鴻郭賚向滿都古勒汗讒間以汗弟博勒呼濟農欲加惡於汗以取伊克哈巴圖爾鐘金汗不信云博勒呼濟農斷不出此惡言似爾如此讒間我兄弟之人須懲治之遂削鴻郭賚之唇而殺之逮後永謝布之伊斯滿太師奏汗以鴻郭賚之言本真乃無罪就戮實屬可憫又赴濟農告以爾兄汗已信鴻郭賚前言欲加惡於爾濟農不信又云爾如不信試汝之人將來矣遂出汗前後聞是言遂以為實遣使二人往見之曰爾因何與我如此結仇或曾告我以鴻郭賚之言為實汗使言畢濟農以為遣人探我果如人言遂怒不出一語使人回告濟農發怒並無回言汗以為實怒云今我除博囉克沁伊錫克二女外並無子嗣將來我之僕役人衆皆為彼有今不速發尚何待耶遂遣伊斯滿太師率衆往擒濟農逃避未獲遂掠其産其錫吉爾福晉永謝布之伊斯滿太師占為妻先是博勒呼濟農娶錫吉爾福晉時於甲申年生一子名巴圖蒙克交巴勒噶沁之名巴該者藏匿養育滿都古勒汗之博囉克沁伊錫克二公主俱係小福晉滿都海徹辰所生伊克哈巴爾圖鐘金無所出以博囉克沁公主下嫁於鄂尼郭特之伯格哷森伊錫克公主下嫁於蒙郭勒津察庫特之科賽塔布囊滿都古勒汗自癸未至丁亥在位五年年四十二嵗歿嵗次戊子博勒呼濟農年二十九嵗時生巴延蒙克嵗次庚寅年三十一嵗為永謝布之克哩葉察罕特穆爾蒙克哈喇班迪等五人所害先是其子巴圖蒙克四嵗時其母錫吉爾福晉為伊斯滿太師所娶生巴布岱布喇該二子伊斯滿太師去時以巴勒噶沁之巴該不善撫養巴圖蒙克乃取回交唐拉噶爾之特穆爾哈達克養育此子因自幼離去父母遂得膈症特穆爾哈達克之妻賽海餂穿銀碗底以治之獲痊由是科爾沁之烏訥博羅特王欲取滿都海徹辰福晉滿都海徹辰福晉云君之後裔若俱已斷絶則此亦君之屬族似乎可行但聞君之姪巴圖蒙克現在特穆爾哈達克處既有伊在我斷不適他人阿勒噶察特桑該烏爾魯克然其言遂止不與滿都海徹辰福晉詢問郭爾羅斯之薩岱昨科爾沁之烏訥博羅特王曾有言道及今此子至若此二人往何處為善薩岱云與其等候幼子不如往適烏訥博羅特於大衆有益復向桑該烏爾魯克之妻扎哈阿海如前詢問扎哈阿海答以若適哈薩爾之子則引入惡途離却屬衆恐敗福晉之名若守汗之子則上天保佑爾等據有國衆可以表揚福晉之名譽徹辰福晉以扎哈阿海之言為是而責薩岱云爾謂汗之子幼沖以哈薩爾之子年富是以我福晉寡居故以言戲侮耳遂取熱茶一盞自頂上傾灌之其年庚寅巴圖蒙克年已七嵗携其手引至令家宰蒙肯伊喇古祈天禱祝畢向母老福晉云埋沒於善惡不分之處今得聞世傳汗位博爾濟錦後裔之名因訪知哈薩爾之子烏訥博羅特意欲娶我故恚而來求於福晉母氏之亭昔以花馬為贄乃謂此姪沖幼大叔哈薩爾之子可來此資養豈以母氏之門庭輕薄閥閲低微而來乎抑謂以所仰望非若烏訥博羅特之盛大而不去乎祈老母福晉鑑察愚媳之誠心竭誠具奏母后嘉其堅心不移等候幼子巴圖蒙克婚配愛而憐之俾其左生七男右生一女循此以生名為七博羅特庶使生齒繁衍遂令之回烏訥博羅特以其言為是泣下遂息前言不及一字較前和好有加矣滿都海徹辰福晉係戊午年生年三十三嵗巴圖蒙克係甲申年生年七嵗定為夫婦本年庚寅因欲占據達延國遂稱為達延汗於老福晉前即汗位由是聰睿滿都海徹辰福晉將髮向上纒裹將國主達延汗貯於皮匱內以馬負之加兵於四衛喇特大戰於塔斯博爾圖勝之虜獲無算其後滿都海徹辰福晉一乳生圖嚕博羅特烏魯斯博羅特二子其次一乳生圖嚕勒圖公主與伯爾色博羅特二人次生阿爾蘇博羅特一人又其次一乳生阿勒楚博羅特幹齊爾博羅特二子逮後興兵往征四衛拉特時滿都海徹辰福晉墜馬洪竒喇特之額色壘太保徹辰濟古爾逹爾罕巴勒噶沁之巴延布庫阿薩特之巴圖博羅特等四人保護乘騎巴雅古特之上好黃馬衛之而出由是養成二子人取阿爾蘇博羅特一人教養之奉老福晉之命此其母滿都海肫誠善念之所致也乃大設筵宴以慶賀之
