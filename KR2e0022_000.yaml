body:
  text: 蒙古源流提要臣等謹按蒙古源流八卷乾隆四十二年奉敕譯進其書本蒙古人所撰末有自敘稱庫圖克徹辰鴻台吉之裔小徹辰薩囊台吉願知一切因取各汗等源流約略敘述並以講解精妙意旨紅册沙爾巴胡土克圖編纂之蓬花漢史雜噶拉幹爾第汗所編之經卷源委古昔蒙古汗源流大黃册等七史合訂自乙丑九宫值年八宫翼火蛇當值之二月十一日角木蛟鬼金羊當值之辰起至六月初一日角木蛟鬼金羊當值之辰告成書中所紀乃額訥特珂克土伯特蒙古汗𫝊世次序及供飬諸大喇嘛闡揚佛教之事而其國中興衰治亂之跡亦多按年臚載首尾賅備頗與永樂大典所載元朝祕史體例相近前者我皇上幾餘覽古以元代奇渥溫得姓所自必史乘𫝊訛詢之定邊左副將軍喀爾喀親王成衮扎布因以此書進御考證本末始知奇渥溫為却特之誤數百年之承訛襲謬得藉以釐訂闡明既已揭其旨於御批通鑑輯覽復以是編宣付館臣譯以漢文潤色排比纂成八卷其第一卷內言風壇水壇土壇初定各種生靈降世因由及六噶拉卜乘除算量運數而歸於釋迦牟尼佛教之所自興是為全書緣起次紀額訥特珂克國汗世系首載星哈哈努汗之曽孫薩爾斡阿爾塔實迪汗之子丹巴多克噶爾成佛事而自烏迪雅納汗以下崇信佛教諸大汗及七贊達七巴拉四鍚納等汗則俱詳著其名號與藏經內之釋迦譜約略相仿次紀土伯特汗世系始於尼雅特贊博汗在善布山為衆所立終於札實德汗大致亦頗與西番嘉喇卜經合其中載持勒德蘇隆贊娶唐太宗女文成公主持勒丹租克丹汗娶唐中宗弟景德王女金城公主核之唐書太宗貞觀十五年以宗女文成公主妻吐蕃贊普葉宗㺯贊中宗景龍初以雍王守禮女為金城公主妻吐蕃贊普葉隸蹜贊其事蹟多屬相符是土伯特即吐蕃國號而唐書所稱葉宗弄贊乃持勒德蘇隆贊之訛其汗世以贊博為名與唐書所稱贊普亦音相近也其第三卷以後則皆紀蒙古世系謂土伯特色爾特贊博汗之季子布爾特齊諾避難必至塔地方其衆尊為君長數𫝊至勃端察爾母曰阿隆郭幹哈屯感異夢而生又九𫝊至元太祖與元本紀多相合而間有異同其稱元太祖為索多博克達青吉斯汗元世祖為呼必賚徹辰汗元順帝為托歡特穆爾烏哈噶圖汗自順帝北奔後世𫝊汗號至林丹庫克圖汗而為我朝所克中間𫝊世次序名號生卒年嵗釐然具載詮敘極為詳悉明代帝系亦附著其略其最蹖駁者如以庫色勒汗為元明宗弟在位二十日史無其事又以明太祖為朱葛仕元至左省長官讒殺托克托噶太師遂舉兵迫逐順帝亦為鑿空失實其他紀年前後亦往往與史乖忤蓋內地之事作書者僅據𫝊聞録之故不能盡歸確核至於塞外立國𫝊授源流以逮人地諸名語言音韻皆其所親知灼見自不同厯代史官托拾影響附㑹之詞妄加纂載以致魯魚謬戾不可復憑得此以定正舛訛實為有禆史學仰惟我國家萬方同軌中外嚮風蒙古諸部久為臣僕乃得以其流𫝊祕冊充外史之儲藏用以參考舊文盡却耳食沿訛之漏一統同文之盛治洵亘古獨隆矣乾隆五十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
