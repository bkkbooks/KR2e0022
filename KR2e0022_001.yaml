body:
  text: 人名瑪哈薩瑪迪蘭咱額訥特可克語莽貝古爾外嘉勒博土伯特語鄂蘭察額爾古克徳克森哈汗䝉古語咱噶喇斡爾迪汗梵語羅咱汗噶里雅納汗幹喇噶里雅納汗烏特博哈達汗滿達達汗薩嘉班迪達班辰沙克嘉錫哩阿克沙巴達僧格錫里巴達阿賚努汗姓沙嘉星哈哈努汗蘇都達納碩克洛達納多囉諾逹納阿宻哩都達納蘇達迪女舒噶拉迪女囉納迪女阿宻里迪女薩爾幹阿爾塔實迪南迪迪霞巴迪哩噶瑪哈納瑪阿尼嚕達阿南逹徳幹逹特蘇卜喇布逹瑪里噶巴逹喇外沙里瑪哈瑪雅福晉女丹逹必尼布宻噶公主烏廸雅納汗瑪哈黙特噶拉幹尼瑪哈巴特瑪彬巴薩喇汗巴喇哈瑪逹廸巴爾哈納資逹汗巴喇廸岳逹汗沙逹尼噶喇特納贊逹喇瑪爾吉實喇尚噶喇星哈逹沙喇塔烏巴里噶實卜阿羅漢阿碩噶汗巴廸里噶噶尼噶汗瑪哈徳幹托音巴蘇宻逹班廸逹蘭扎贊逹哈哩贊逹鍚里贊逹昻吉贊逹逹爾瑪贊逹必瑪拉贊逹郭宻贊逹郭巴拉逹爾瑪巴拉幹噶巴拉喇木巴拉廸木巴拉茂巴拉尼巴拉巴拉鍚納噶伯鍚納諳逹鍚納拉噶瑪鍚納瑪哈沙嘉沙嘉里則必沙嘉沙幹哩班逹巴汗嚕巴廸必喇滿即婆羅門也尼雅特贊博汗穆持贊博汗定持贊博汗索持贊博汗墨爾持贊博汗逹克持贊博汗色哩持贊博汗智固木贊博汗隆阿木臣名罝持博羅咱布爾特齊諾布徳恭嘉勒汗即博羅匝布隆錫勒克庫嚕勒克伊碩勒克徳魯納木松色諾勅納木徳徳諾勒納木徳諾勒博徳嘉勒博徳必林賛多哩隆賛持賛納木持托克哲賛拉托托哩年賛地名瑪噶逹國額訥特珂克幹齊爾圖土伯特沙嘉姓倫必花園噶必里克城阿蘭扎喇江蘭咱吉爾哈城祗陀園幹喇克城郭薩拉國外沙里城巴特薩拉國彀焚繖巴喇國畢瑪拉雅納喀齊國古納實納國扎拉勒達喇廟雪山雅爾隆姓剛噶江即恒河拉里姜托山拉里囉勒博山雅爾隆賛塘善布雪山寧博包恭布温博拉岡宫欽定四庫全書欽定䝉古源流卷一額訥特珂克土伯特䝉古汗等源流納摩沽嚕嘛尼雅租鎬一阿雅頂禮三寶三世諸佛普度三界三恩喇嘛三才定位克成庶類佛度生靈聖化炳蔚試綜昔者額訥特珂克土伯特䝉古三國根本世基之載在舊史者而統論之凡一切依倚外象包羅者已定一切因縁生靈已成外象定自三壇起於風壇次及水壇定於土壇是也以言乎風壇則由無所有空十面大作所向感被而温和碧色之風壇凝然定矣以言乎水壇則由觸於風壇彩雲疊布叢生聨綿隂雨以成無邉岸作鹹之大海而水壇定矣以言乎土壇則由金界糞土定若乳上凝脂以次各七七分數加添自細塵以至埃塵沙纎㣲野馬細末為一粒油麥七粒油麥為一寸二十四寸為一肘四肘為一丈至五百丈自一畫角聲聞處起至八畫角聲聞處為一里以如是甚多之里數名為大自在金地土壇其中山之大者為須彌山以及七金山七大海四大部洲八小部洲一時顯然著矣内藏包羅者自初禪天一神變幻降世起漸漸蕃衍色界十七天無色界四天欲界二十天并過去未來現在世界之六種生靈以次而成因彼生靈神變而來故夀數無算雖生於世上行不踐地飛空而行不食下界所生穢榖惟食禪榖無論男女不自胎生皆由化生是時無有日月本身之光可以自照彼時不以人稱皆呼為生靈其後生靈萌發欲念有一生靈食下界一種糧穀衆皆效尤食之禪穀遂絶遂皆食下界所生之糓不能空行於是墮地本身之光頓失不能自照而痴愚罪業漸從此起嗣因衆生修省之力遂現出日月星辰以燭其昏暗而得明燦矣其後衆生内復出一恣慾生靈得粒食於青苗而衆生亦俱從食之由是食用下界所産穢榖分别男婦生男生女嗜慾之罪業由此始矣其後衆生内復出一恣慾生靈獲不種自生名薩魯之糓不識為何糓乃嘗食之衆生遂俱食此糓其從前之穀俱絶衆生雖食此榖但必至將食之際臨時採食其後有一機巧生靈将次日所食者先日採收是糓亦絶而忌妬之罪業自此始矣其後因食耕種之榖遂常食下界穢糓若食多者醜惡食少者俊秀故有爾我好醜愛惡之情復起争兢遂刧奪所耕之田地彼此相殘而忿爭之罪業自此始矣又因多收者向少收者隱瞞藏匿而慳吝之罪業自此始矣由是有一端莊正直聰睿大量之生靈將從前所行是者愛之非者化之将田地均平分種惠愛衆生衆生皆願不違其命以之為主遂羣以主稱之於額訥特珂克語則謂之瑪哈薩瑪廸蘭咱於土伯特語則謂之莽貝古爾外嘉勒博於䝉古語則謂之鄂蘭納額爾古克徳克森哈汗於滿洲語則謂之格稜尼圖伽赫汗是為衆所推尊之汗其於薩滿達巴達喇佛教四大部洲則有轉金輪咱噶喇斡爾廸汗之譽其時則稱為肇造噶拉卜以前全備之時其時日月星始顯露於空中照耀四大部洲瑪哈薩瑪廸蘭咱汗之子曰囉咱汗囉咱汗生噶里雅納汗噶里雅納汗生斡喇噶里雅納汗斡喇噶里雅納汗生烏特博哈達汗烏特博哈達汗生滿達達汗稱此六汗為轉輪首出之六汗彼時始稱為人於是人之年夀漸漸削減計其時極微末之數為一瞬百瞬為一息六十息為一間三十間為一刻六十刻為一時十二時為一日三十日為一月十二月為一嵗按年計其耗閏則為噶拉卜噶拉卜有六乃鎮定噶拉卜棲止噶拉卜適中噶拉卜殘剋噶拉卜空虚噶拉卜濶大噶拉卜是也其第一鎭定噶拉卜則自始定風壇起至生育善惡衆生止其第二棲止噶拉卜則自南贍部洲人之年夀無算起至十嵗止其第三適中噶拉卜則自男女十嵗之末起並不傷生由二十嵗漸增至八萬嵗止其第四殘剋噶拉卜則自兵戈相殘起至水來殘剋止其第五空虚噶拉卜則自水來殘害至盡起至復定風壇止其第六濶大噶拉卜則自風壇始定起至空虚噶拉卜之末止如是乘除算量已往運數及善世之千佛其曾超出噶拉卜者惟有釋迦毘婆佛等七佛乃係已過去者其時諸佛将佛經法教在瑪噶達國斡齊爾圖地方宣示十二種善言溯昔千佛南贍部州之人等夀數止於四萬嵗之時乃拘留孫佛之教也三萬嵗之時乃拘那含佛之教也二萬嵗之時乃迦葉佛之教也自百嵗之時至今乃釋迦牟尼佛之教也釋迦牟尼佛共承受四佛法教謂昭阿廸沙釋迦牟尼佛生於乙丑年至年八十嵗嵗次甲申涅槃其在時輪史則云生於丁未年嵗次丙寅涅槃而薩嘉班廸達又云生於戊辰年嵗次丁亥涅槃雖額訥特珂克土伯特諸賢所言互異而金光明經則云佛斷不涅槃聖經斷不冺滅乃佛為教化衆生俾信認無常故示以涅槃耳佛之壽源誰能揣測其顯然之虚質雖滅而湛然真純之法身則何由而滅乎且合按前聖薩嘉班廸達班辰沙克嘉錫哩所纂時輪法數史又前聖吉哩廸多咱之宣示引導無垢女子舊史又前賢阿克沙巴達所編之靈驗花史又大智慧僧格錫哩巴達所編之丹書凡四史文義相倣今試将釋迦牟尼佛教及額訥特珂克國汗等之縁由如薩嘉班廸達所説者陳之自昔衆所推尊之沙嘉阿賚努汗以來後越一阿僧祗七萬四千五百六世於額訥特珂克之瑪噶達國斡齊爾圖地方降生名星哈哈努汗生四子四女長子蘇都達納次子碩克洛達納三子多囉諾達納四子阿密哩都達納長女蘇達廸次女舒噶拉廸三女囉納廸四女阿密哩廸四子生八孫自凡一切依倚外像包羅者已定句起至四子生八孫句止與西番字及漢藏經釋迦譜相仿蘇都達納之子則薩爾斡阿爾塔實廸南廸二人碩克洛達納之子則廸霞巴廸哩噶二人多囉諾達納之子則瑪哈納瑪阿尼嚕達二人阿密哩都達納之子則阿南達徳斡達特二人四女生四甥蘇達廸之子曰蘇卜喇布達舒噶拉廸之子曰瑪里噶囉納廸之子曰巴達喇阿密哩第之子曰外沙里其薩爾斡阿爾塔實廸汗之子嵗次丙寅婁金狗值月二十二日化為丹巴多克噶爾有似阿蘭扎斡爾丹大象自兠率天降於南贍部洲之瑪噶達國嵗次丁夘箕水豹值月十五日夜間汗所都之城有五色光芒照耀瑪哈瑪雅福晉遂有孕至嵗次戊辰翼火蛇值月十五日日方出時降生於倫必花園内自嵗次甲戌七嵗起習練種種技藝至嵗次癸未年十六嵗時娶噶必里克城之丹達必尼之女名布密噶公主為福晉承受汗之統緒嵗次丙申年二十九嵗時於甚清浄塔之前情願出家在阿蘭扎喇江邉堅持苦行六年嵗次壬寅年三十五嵗時氐土貉值月初八日於菩提木下坐禪七日十四日夜間将蘭咱吉爾哈城之衆怪除滅十五日日出時於瑪噶達國在金剛座上得尊勝釋迦牟尼佛之道嵗次癸夘年三十六嵗時自星日馬值月初一日起至十五日在祗陀園等處顯示大神通於是年氐土貉值月初四等日轉運三乘法輪度化三世衆生嵗次丁亥年八十嵗時氐土貉值月十五日夜因曉諭衆生所演經文無常故将化生涅槃顯示此薩爾斡阿爾塔實廸汗之子生甫六日其母瑪哈瑪雅福晉即歿後於壬寅年得佛道又六年嵗次乙未因獲智慧眼之故見母瑪哈瑪雅福晉超生三十三天因欲其母識菩提之道是以上逰天堂講經九十日其時有額訥特珂克之烏廸雅納汗中心慕佛迫欲求通遂令瑪哈黙特噶拉斡尼仿摹佛像塑佛一尊以適其意黙特噶拉斡尼仗神通力遂往三十三天用牛頭旃檀香以肖佛像毫無分别造成持經手印立像之旃檀昭像自三十三天請至汗意欣慰後來佛自上界下降其旃檀昭於佛前自然俯伏佛降旨曰此旃檀昭視我涅槃一千年之後彼時至中國震旦大有利益因授記云由是釋迦牟尼佛之教遍𫝊瑪噶達國斡喇克城之沙嘉氏瑪哈巴特瑪之子彬巴薩喇汗郭沙拉國外沙里城之巴喇哈瑪達廸之子巴喇哈納資達汗巴特沙拉國阿南達之子巴喇廸岳達汗彀楚􅓫巴喇國沙達尼噶之子烏廸雅納汗此四汗皆統屬三十二國之大汗以次降生崇隆佛教方佛涅槃時有彬巴薩喇汗之子喇特納贊達喇及其二子瑪爾吉實喇尚噶喇並孫星哈曾孫達沙喇塔同見佛涅槃計自丁亥戊子越一百一十年嵗次丁丑瑪噶達國之君彬巴薩喇汗之孫瑪爾吉實喇汗因係大布施主應致祭必瑪拉雅納葉洞之阿南達烏巴里噶實卜三人㑹集五百應供阿羅漢初演宣示四諦法輪之旨自戊子年起至一百一十年之丁丑年達沙喇塔汗之子阿碩噶汗因係大布施主於外沙里大城處所應供阿羅漢巴廸哩噶為首糾合七百阿羅漢将中土無相法輪之㫖宣演阿碩噶汗建造無算佛像經塔自戊子年起越三百年歳次乙亥喀齊國之君噶尼噶汗亦係大布施主其時喀齊古納實納國中有扎拉勒達喇廟内魔怪化為瑪哈徳斡托音降生仗神變力將佛法紊亂於是巴蘇密達為首捄之聚集五百菩薩五百阿羅漢五百班廸達等将佛誦之大乘法輪宣演由是生蘭扎贊達哈哩贊達錫哩贊達昻吉贊達達爾瑪贊達必瑪拉贊達郭密贊達等七贊達郭巴拉達爾瑪巴拉斡噶巴拉喇木巴拉廸木巴拉茂巴拉尼巴拉等七巴拉巴拉錫納噶伯錫納諳達錫納拉噶瑪錫納等四錫納等汗輔相佛法等語詳為敷演思議莫盡未能盡録至若雪山土伯特地方汗等根源解釋贊誦佛菩薩之史内載瑪哈沙嘉沙嘉里則必沙嘉沙斡哩三君其沙嘉沙斡哩乃烏廸雅納汗之孫班達巴汗之第五子與十八萬讐衆戰鬭被擊創幼子嚕巴廸敗走至雪山地方遂為土伯特之雅爾隆氏自班達巴汗起至雅爾隆氏止與西番續蔵經合自維時巴特沙拉國之烏廸雅納汗起至末與西番嘉喇卜經合維時巴特沙拉國之烏第雅納汗生一子其髪圜旋牙如白螺手足指如鵞掌目如鳥雀下睫上附諸妙相全備令善占之必喇滿占之曰此子剋父應殺之其父勅官屬持往殺之加諸鋒刃利器皆不能傷於是計窮貯以銅匣棄擲恒河中有附近外沙里城之種地老人適在江岸種地見江面有漂浮之匣撈取開看見一端正小兒此老人因無子嗣欲養之遂藏置樹梃間羣鳥銜鮮果衆獸銜淨肉以哺之後能言因問我係何人為誰之子老人悉以前事告知其子遂懷慚尋向東邉雪山而去至拉哩姜托山由拉哩囉勒博山之九級福階降下至雅爾隆贊唐所有之四戸塔前衆方㸔見爭問爾家何處何人之子是何姓名竟不答言但順手以食指指天衆見其相異常人咸歎云爾殆天之子乎乃答曰我是天子乃古昔瑪哈薩瑪廸蘭咱汗之後裔遂将其從前事跡盡告衆知衆皆謂前此浮江不死繼又得衆鳥獸争哺是真天子也遂縳木椅櫈以為肩輿令坐其上舁上純雪之善布山巔衆皆歡忭尊以為汗自前戊子年以來踰千八百二十一年嵗次戊申即汗位遂稱為尼雅持贊博汗由此勝四方各部落而為八十八萬土伯特國主尼雅持贊博汗之子曰穆持贊博汗穆持贊博汗生定持贊博汗定持贊博汗生索持贊博汗索持贊博汗生墨爾持贊博汗墨爾持贊博汗生達克持贊博汗達克持贊博汗生色哩持贊博汗此七汗臨終時自足至頂出現五采霞光如虹霓上徹天際其尸曾供於天神等地色哩持贊博汗之子曰智固木贊博汗為姦臣隆阿木簒弑其三子皆出亡長子罝持逃往寧博地方次子博囉咱逃往包地方第三子布爾特齊諾逃往恭布地方隆阿木據汗位甫半載有舊日數大臣將福晉移往他邦設計興復遂将背叛之隆阿木誅戮議於汗之三子内選立一人即位福晉云我從前生博囉咱時夜夢與一白色人同寢迨後産一卵此子出卵中觀此當是一有福佳兒宜将彼迎至於是遂將博囉咱迎即汗位稱為布徳恭嘉勒汗其子曰布隆錫勒克布隆錫勒克生庫嚕勒克庫嚕勒克生伊碩勒克稱為六賢汗自六汗既葬後始立墳墓伊碩勒克之子曰徳嚕納木松徳嚕納木松生色諾勒納木徳色諾勒納木徳生徳諾勒納木徳諾勒納木生徳諾勒博徳諾勒博生徳嘉勒博徳嘉勒博生徳必琳贊徳必琳贊生多哩隆贊此數汗為衍慶七汗多哩隆贊之子曰持贊納木持贊納木生持托克哲贊持托克哲贊生拉托托哩年贊自昔戊子年以來踰二千四百八十一年嵗次戊申拉托托哩年贊甫生於丁夘年二十歲時始即汗位迨後一日正坐温博拉岡宫中見有百拜懺悔經髙尺許金塔六字母全備之寳匣薩瑪多克經自空中齊落宫中金幔上因諸人不識遂埋於地下由此汗福分消減國中生産多目𦕈者糧食歉收饑饉灾病不絶禍患叢生如是越四十年後忽有五士人來見汗歎曰大汗従前縁何將天上所落之物掩埋言訖即不見汗即時委内官等出其四種寳物繫於纛頂敬謹叩頭多方供獻汗之福祉由此漸增生子俊秀米糓豐稔無有灾病安享太平矣欽定䝉古源流卷一
