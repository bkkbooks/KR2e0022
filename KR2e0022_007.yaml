  - {type: page-break, offset: 0, content: '', id: KR2e0022_WYG_007-1a, image: WYG0410/WYG0410-0622a.png}
body:
  text: 額訥特珂克土伯特䝉古汗等源流其三次迎接者乃鄂爾多斯之徹辰洪台吉圖黙特之達顔諾延為首帶領三千人往迎以各色緞絹錦蟒駝隻金鞍馬匹牲畜等物共萬件為䞇呈獻叩拜於是顯示能識一切之四臂觀世音菩薩之像令徹辰洪台吉見之次日起行能識一切喇嘛所騎名諾爾布章扎之紅馬途次所履石上顯出六字大衆見之大起至誠之心嵗次戊寅大衆瞻仰聖識一切喇嘛皆甚歡悅汗與徹辰洪台吉二人審視能識一切喇嘛有驚駭之色其聖識一切之通事瓦齊爾圗邁衮歡津𫝊言問云汗與諾延二人何故審視我耶汗降㫖曰我從前曾有足疾續因足疾復犯聞裝入馬腹内治之能愈是以殺馬以足伸入馬腹之内其痛愈不可忍忽舉首仰視見一白色人半天而至云汗爾為何作此大孽言訖不見由是畏懼經土伯特阿里克喇嘛指教持誦六字咒語甚善曾令固密巴克什持捻數珠每日唪誦一百零八遍今詳視爾即其人也故我視之駭然徹辰諾延云從前我在我父母膝下著棋為戲我母賜給馬頸正在欲食之際手中所持小刀忽向上躍起似中内臁落下刀尖挿於地上拔刀仰視空中有一穿青衣少年嗔責之曰爾為何竟食馬肉耶倐忽不見由是我即戒食馬肉今審視聖喇嘛即其人也喇嘛既能鑑照我輩我輩反不識喇嘛是以為異而駭視之耳聖識一切喇嘛微笑曰汗與諾延之言誠然我等非止今日曾世世相會阿勒坦汗爾為曩昔青吉斯汗之孫胡必賚徹辰汗之時我為帕克巴巴喇宻特之姪瑪迪都瓦雜帕克巴喇嘛因徹辰之秦貝福晉將功徳喜金剛之全備等四灌頂并解脱隴灌頂等經廣為𫝊授曾與我漢語三聖大王國師之號欽賜寳印黄劵尊為首舉喇嘛徹辰洪台吉爾於曩昔我世尊佛釋伽牟尼之時為瑪噶達國之俎克占寧博汗曾為佛家施主爾弟徹辰岱青曾與爾同時為髙薩拉國之薩勒扎勒汗此大通事瓦齊爾圖邁歡津為巴克什之時曾為鄂克羅咱瓦羅勒丹沙喇卜後于帕克巴喇嘛之時曾為伊爾桑之喀喇黙里圖通事又曾為徹辰汗帕克巴喇嘛二人之通事今為我等三人之通事併此次計之為我徒弟已三代矣復為爭鬭時之轉輪阿勒坦汗照明昏暗部洲首先穿白衣乗白馬而導引焉汗同諾延鍾錦福晉等帶領萬人又迎至於察卜哈勒廟筵宴行相見禮以五百兩銀所造七珍八寳三十兩金碗内滿盛寳石上好緞各十端五色緞各百端各色寳石鑲嵌金鞍白馬十匹幣帛五千匹馬匹牲畜五千匹共萬件呈獻為贄大張筵宴歡悅共坐之際鄂爾多斯之徹辰洪台吉懇祈通事瓦齊爾圖邁衮歡津轉奏云從前適逢善縁之力供奉牌位聖喇嘛與施主汗二人如日月并照於天昔者奉上帝玉皇之㫖佔據五色目之索多博克達青吉斯之孫觀世音菩薩之化身庫騰汗與轉輪胡必賚徹辰汗二人識見至極帕克巴巴喇宻特生靈依庇之帕克巴喇嘛二人與䝉古有道汗等及得獲薩斯嘉道之喇嘛等會合以道教使大衆共享太平降自烏哈噶圖車辰汗以來道教漸衰大衆造惡作孽血肉相殘今值爭鬬之時得與似釋伽牟尼佛之聖喇嘛似玊皇大帝之大力汗二人相遇伏願自令斂福衍慶之日為始將湧血之大江變為溢乳之淨海開覺從前汗等遺留經史善路汗與喇嘛二人以善相結則普遍大衆利益之事其重興矣是時漢人土伯特䝉古衛果爾喇嘛喀喇等聚集十萬餘人聞奏是言如孟夏鳩鳴之聲俱傾耳以聽所有人衆共相歡悅稱奇而聖識一切喇嘛與阿勒坦汗並汗之屬下喇嘛喀喇無不讚美嘆為希有從前䝉古人等死後則儘力宰殺駝馬殉𦵏以為盤費自此力改竭力奉行經教按年逐月並按八節持戒誦經其四項出家之人常人如動手詈罵譏誚綽爾濟等則照洪台吉例喇木扎木巴噶卜楚則照台吉例格隆等則照塔布囊歡津台吉宰桑例其托音齊巴噶察烏巴什烏巴繖察等則照官員例禁治每月持齋三日禁止殺牲漁獵若出家人違背經教取妻者照經教以黑烟塗面令轉廟三匝責而遣之烏巴什烏巴繖察等若違經教殺牲亦照前責處入官托音烏巴什等若飲酒則毁棄其所有之物並㕘酌從前土伯特之三汗並䝉古胡必賚汗時舊例創立十善福經之政尊以聖識一切瓦齊爾達喇達賴喇嘛之號照依諾們汗帕克巴喇嘛供奉四項瑚巴喇克不派畋獵不索供賦以整齊道教由是聖識一切瓦齊爾達喇達賴喇嘛贈給阿勒坦汗轉千金法輪咱克喇瓦爾迪徹辰汗濟農哈什汗之號徹辰洪台吉則贈以從前額訥特珂克名郭喀噶爾弼徹辰洪台吉之號徹辰台吉則不改原號仍給與薩勒扎勒徹辰岱青之號瓦齊爾圗邁歡津則贈以灌頂慧翁歡津之號阿里克喇嘛則贈以額齊格喇嘛之號固密巴克什則贈以蘇喀歡津之號阿玉錫巴克什則贈以阿南達固什之號以及諾延塔布囊巴克什官員等則隨其職之尊卑任之輕重照經教之例均贈給名號焉先是聖識一切瓦齊爾達喇達賴喇嘛曾許于尼洛木塔拉地方修造彌勒佛之像前往尼洛木塔拉之際正值阿勒坦汗收服庫徳勒庫人衆許於歸化城將生靈依庇詔釋伽牟尼佛像用寳石金銀裝嚴而博碩克圖咱克喇瓦爾迪徹辰濟農台吉許將一百八函甘珠爾經用寳石金銀裝修薩勒扎勒徹辰岱青許建立三世佛之廟均皆出於至誠達賴喇嘛前往尼洛木塔拉計及途次叩拜領受灌頂聽經之人衆多必致躭延諭令班臣索納木扎克巴小瑚圖克圖云爾先前往駐宿尼洛木塔拉之中間到之日即入馬明王殿中化導彼處土神或三日或七日内彼處有我一物其處土神自然指給與爾可將此物收好以備築砌廟基之用於是小瑚圖克圖遵諭先往到彼即遵照尊喇嘛諭言入坐馬明王殿中越三日夜間見一丰雅少年服白衣自左至右斜掛白數珠一串披白袈裟而來向小瑚圖克圖前以手加額叩拜訖跪白昔者爾之尊聖達賴喇嘛為額訥特珂克南邊畢塔人等之主衮楚克榜汗之子時曾給寳石裝飾金鞦轡踢胷一副以及馬匹之各樣裝飾令我收貯又授我烏巴什之戒上項物件我收守至今今汝既能照依爾尊喇嘛所諭明日即取出給爾言訖不見及曉起視果有各種寳石鑲嵌馬匹裝飾一副以喇嘛之言果驗取而敬謹存貯廟内乃築基甫竣而聖識瓦齊爾達喇達賴喇嘛至矣是時土伯特有一托音前往彰地方貿易将瓦齊爾達喇達賴喇嘛畫像給與彼處之薩達木汗之父彼汗取而擲棄於地是夜即夢一穿黑之人前來執一水晶靶之刀向伊心窩刺之次早遂自鼻内流血而死今伊子薩達木汗因喇嘛施與仁慈其心感動覺悟從前惡習因難以明言伊父之過不得親身前往叩拜乃用百兩精金鑄為首級併金五百兩銀千兩各樣寳石緞絹無筭令名札罕布哈者為首帶領三百人前往呈獻云我於暗中誠敬懺悔祈禱若恵愛於我可照依喇嘛身體修造一像發來復另獻精金十兩於是令巴勒布之匠人等將喇嘛之像造成又將别項大有利益龕像一併交使人持去薩達木汗不勝歡欣敬謹供奉喇嘛之像夀享八十七嵗其薩達木汗所獻之金墁於廟頂並裝成拉沁巴勒巴爾宣威大慈彌勒佛之像喇嘛親身持授靈光顯降入化自天散下花雨大衆見之無不起敬適彼處有一術士名商順博木博納木則者作法以雷來擊瓦齊爾達喇達賴喇嘛用袈裟承受擲於水中次早術士博木博至向聖喇嘛叩首請云我用術曾致死九十七人今用術以制聖喇嘛三次未能侵犯我已九十七嵗死後將墮三惡道中今求將我從前所造之罪向觀世音菩薩之前禱祝懺悔以祈後世皈依佛教祈將格隆之戒授我我若死於爾前幸指我道路禱求畢因係托音至第七日乃死遂將伊引入菩提之路由是汗請棟科爾滿珠錫里瑚圖克圖親身帶領嵗次己卯囘至䝉古地方從前大明隆慶汗之四年嵗次辛未以徹辰洪台吉宣勞政治給與龍虎將軍之號及玉印黄劵未及領受嵗次庚辰年四十一嵗自寧夏至榆林城由二十一城内得獲大庫數藏嵗次乙卯年七十六嵗大病外形消減内氣尚未盡絶䝉果勒津圖黙特之大臣官員等私相商議以此經教有何利益既無益於汗之大夀更有何益乎皆此等喇嘛之欺誑也其殺之云云時滿珠錫里瑚圖克圖聞之令圖黙特之大臣官員等齊集汗前向伊等云凡始事無終如水中之月一身無恒如鏡中之形生死世之轉也凡生靈無不死者無論何人不能越過一死若無生亦無死惟金剛身佛則無死滅似此獲佛道者除誠慤尊經外别無他法幾見有未得佛道而能不死之人耶即三世衆佛今世之釋伽牟尼佛亦未將人之不死著於經今我尊喇嘛聖識一切瓦齊爾達喇達賴喇嘛明日若到亦不過似此誦經若時命已至死復誰能阻止若時命未至所有災病藥與經之力皆可以治之今汗之命數既到不可治矣但聖識一切曾謂汗係觀世音菩薩化身如果佛法及承教之博迪薩都與汗三人相會則仗聖識一切利益之力以驗聖汗之誠心唪誦經咒又令額爾徳尼額爾徳木圖藴丹林沁醫士以藥吹入汗之鼻内祝云大汗其承教以來臨乎滿珠錫里瑚圖克圖唪誦三遍汗乃復生大衆稱奇傾心向化將從前議論直陳不諱汗降㫖曰爾十二圖黙特之大臣官員等為何欲毁我宣演之法以加害於胡巴喇克耶從前無佛法時我先祖並無經教惟供奉本方土神又見誰人常在耶我以前似我之汗似爾等之屬衆又有誰人常在誰人享夀百年耶今我年將八十時亦至矣不獨我也即釋伽牟尼佛曾以死之真實曉諭衆生而親身湼槃以示焉昨我喇嘛未嘗誦聖識一切之經乎爾等俱未之聞乎若鄂爾多斯徹辰洪台吉在此彼則知之越十餘日徹辰洪台吉一聞前事即帶領妻子前來瞻仰汗甚喜悅笑將此事原委悉行告知並齊集十二圖黙特之大臣官員等展閱棟科爾瑚圖克圖之經汗與徹辰洪台吉二人依次將經教功徳反覆開示以日後勿毁法教勿害胡巴喇克之處載入書内令大衆設誓許以宣揚法教又在位一年以慰大衆年七十七嵗殁戊戌年降生嵗次甲申年四十七嵗即汗位本年右翼三萬人共議差遣阿勒坦汗之布延往請瓦齊爾達喇達賴喇嘛允其請來臨途次明地甘肅城其都堂盛設筵宴延請並呈獻贄贐其瓦齊爾達喇達賴喇嘛前所然香烟結成夀字雖用力撥之仍成字不散衆俱驚異甘肅所屬人衆呈獻贄儀無筭以誠求之遂𫝊與灌頂經文而至誠無悔之心油然興矣於是寧夏城之王為首都堂總兵大小各官以次延請頗著恭敬大衆於座中見聖識一切顔色純白一面四臂兩手於胸前合掌問訊左手執青蓮花右手持水晶數珠盤膝趺坐妙相全備各種裝飾璀璨五色霞光煥耀大衆瞻仰呈獻贄儀誠意傾聽精微經文至誠之心益加篤矣嵗次己酉年四十四嵗至徹辰洪台吉所居之伊可錫巴爾地方於密魯克博羅斯之界坐禪三月遂得權衡三界聖馬明王之道與庫土克台徹辰洪台吉托爾罕珠拉徹辰福晉以及衆施主前𫝊示無窮化導灌頂經教復廣為講解自是前往北方途次各施主大臣官員無不邀請呈獻贄儀及至博碩克圖徹辰濟農之地方指示建立三世廟宇之地博碩克圖徹辰濟農徹辰洪台吉徹辰岱青三人扵瓦齊爾達喇達賴喇嘛前承受功徳喜金剛全備之四灌頂設愿不造諸般惡孽遺教照前設立於是昏暗之地宣揚經教朗如皎日矣又前往十三圖黙特地方至彼咎其已將阿勒坦汗之骨殖埋𦵏謂之曰似此無價之寳爾等為何棄擲於地遂起出焚化乃顯示神奇檢獲舎利子無數大衆稱異焉初其父阿拉克濟農原娶哈屯三人阿拉克濟農没後阿勒坦汗將第三哈屯莫倫納之所生獨子土伯特台吉身故伊母不畏作孽欲殺童子一百為殉駝駒一百為䕶庇及殺至四十餘小兒之後衆人爭議䝉果勒津之錫訥克烏爾魯克謂小兒耳聾又謂侍衛台吉若他人前往未免加害小兒不如我親身前去其殺我以殉之因彼不可殺遂停其事迨莫倫福晉殁後尸已埋𦵏縁造孽已深不能脫離鬼域化為鬼祟聖喇嘛知覺乃備三角竈造成功徳威懼金剛布威佛火供遂於其内焚化福晉骨殖喇嘛唪誦經咒召集四臂獄地主欲將鬼祟裝入三角竈内之際見一蛇形义蝎從衣袖内鑽入其頭昻於領外於是喇嘛誠心唪誦解釋世愆濟渡亡魂之經見其頭㸃三次似為叩首之狀其尸仍復如舊後禪火自焚以所供之物呈獻住世出世諸佛並將衣服义蝎焚化其味臭穢人不可近或奔走趨避或失據張皇遥望見壇城烟内一道白光旋繞上起自上化一瓦齊爾薩都之神童而去大衆見之稱奇大起誠敬之心法教昭然如日照於昏夜復如海水之洋溢矣由是前往喀喇沁圖黙特地方圖黙特之衛新巴雅果特博爾濟吉斯毛明安之諾延等邀請得聞廣大精微之經呈獻贄儀無算是時鄂爾多斯之徹辰洪台吉年四十七嵗嵗次丙戌殁後令賽堪囊素瓦齊爾托密公固什阿里占衛徵烏爾魯克伯啟徹辰濟雅噶齊為首往送布延瓦齊爾達喇達賴喇嘛深為嘆悼曰伊已獲菩提之道而去更有何說可惜者爾等無福將一斛有利益之舎利子俱棄擲於地耳言訖乃發善愿為之轉輪其子鄂勒哲伊勒都齊達爾罕巴圖爾於伊父在日年十七嵗衝入托黙克軍陣身著盔甲超乗以戰殺其諾延二人大衆無不稱讚者是年丁亥授以巴圖爾徹辰洪台吉之號令其執政嵗次乙丑年三十四嵗殁前丁亥年有喀爾喀之阿巴岱噶勒照台吉前來叩見呈獻貂皮帳房并幣帛牲畜皆以萬計隨意得以傾聽經文因謂之曰現在所供諸佛内任爾隨手請取一位因隨手取一手持金杵之像達賴喇嘛曰此佛像從前喀木巴瓦齊爾汗供奉時被囘禄之災所有滿堂供奉之佛以及房屋俱焚惟此佛像完好如舊此實大有利益佛像也又給與似大指之釋伽牟尼佛之舍利子以銅造成之藥王佛從額訥特珂克地方請來之有利益佛虎皮成造之帳房並幣帛諸物謂係巴雜爾巴尼之化身遂上大威儀瓦齊爾汗之號焉本年丁亥察哈爾之阿穆岱洪台吉前來叩見呈獻金銀幣帛等物駝馬皆以萬計告以我察哈爾之圖們汗以及所屬大衆欲遣使敦請聖喇嘛以闡揚佛教能識一切聖喇嘛云若於明嵗上半年來請或能前往若遲至下半年即恐無暇前往矣衆皆不省惟阿穆岱洪台吉以此言何所謂而詳思之是以𫝊授阿穆岱洪台吉之灌頂隴灌頂居多嵗次戊子十月能識一切達賴喇嘛一日坐於一髙山頂上開花結果樹下見從樹梢上降下托音一人遂招至互相叩拜二人以額訥特珂克之語講論良久乃散侍立徒衆請問其故答以彼係尼洛木塔拉廟之塔爾拜扎勒燦喇嘛以我起程將近故特來謁見耳囘至廟中喇嘛遂不豫適有中國大明萬厯汗遣索丙保翀薩青三員官為首帶領千人來請預備呈獻聖喇嘛有金床肩輿及金鞍白馬裝載各物之車三百輛延請贄儀係寳石精金百兩銀千兩諸色幣帛各百件勅諭云朕照依先太宗永樂皇帝汗扶持聖教照依䝉古之胡必賚徹辰汗贈給三聖大王國師之號尊為首舉聖喇嘛與察哈爾圖們汗之使臣克錫克騰之圖邁洪台吉克木齊古特巴噶達爾罕諾延並所帶之千人同時而至聖喇嘛云二大國汗之㫖諭極是明人䝉古二國之主二位大汗之㫖非為已身實為衆生感此扶持佛教之恩欲往之心非不甚切今大力汗之使已到我去嵗未與阿穆岱洪台吉言之乎明嵗上半年則可下半年雖來我無暇前往矣其言乃有始將終之言今往他處以施利濟耳自前戊子年起紀三千六百七十五年嵗次壬寅降生極尊之色身年四十七嵗戊子年三月二十六日於使臣前以極樂通慧神通化入觀世音菩薩胸前往臨佛地四月二十五日造火供焚化金身由泥丸現生觀世音菩薩上樂王佛之像明顯慈悲慧眼並獲舎利子無算字跡明顯儼然成一從前無怨汗所造之千尊塔矣乃能識一切慈鑒䝉古人等遂托於圖古隆汗之第四子蘇密爾岱青之達喇福晉之身有孕九月滿足已及十月嵗次乙丑降生瑚畢爾罕即係聖識一切瓦齊爾達喇達賴喇嘛之極尊化身大衆無不聞知其土伯特地方遣使來請乃䝉古等愚騃躁急謂係孩提之童如何遣去十三嵗以内不許其往嵗次壬辰鄂爾多斯之博碩克圖濟農於二十八嵗時佔據鄂爾多斯萬人行兵明地之星錫庫河三日大有俘獲而歸適寧夏城之王姓總兵迎戰右翼鄂庫新之巴圖爾托郭哈爾噶敦之伊什圖哈喇庫濟哈留沁之吉壘濟雅噶齊布哈蓀巴圖爾圖魯拜首先衝入以戰徹辰洪台吉之長子鄂勒哲依伊勒都齊之子巴圖台吉庚辰年生年甫十三嵗乗號鄂欽徳之紅馬追擒一執槍明人濟農以及所屬俱愛慕之遂以伊父之達爾罕巴圖爾之號贈焉嵗次甲午徹辰濟農年三十嵗復行兵明地由阿拉善前往榆林城之馬姓總兵追至遇左翼明藹青岱青之隊明藹青岱青之庫圖克台和碩齊塔布囊托克多爾伊勒都齊哈喇呼拉二人首先衝入奪取烏蘭格爾囘兵由哈喇城徑行䝉古部落前往烏拉罕烏魯克地方其巴圖達爾罕巴圖爾年十五嵗未經同往令其同土伯特哈什噶濟雅噶齊帶領官兵殿後衆殿後兵尚未聚集一聞自腰站解送活口之言即迎前接戰哈爾噶達胡特古爾格之阿什圖哈喇庫濟哈勒吉遜海努克達哈密和碩齊二人首先衝入交戰之際巴圖仍乗號鄂欽徳紅馬深入於烏努古齊之托羅海以及蘇海河中伙地方大破其衆擄獲盔甲馬匹等物滿載以歸大衆讚美復以其祖巴圖爾徹辰洪台吉之號贈給令其執政嵗次戊寅能識一切達頼喇喇之化身年已十四嵗送往土伯特地方隨聖識一切班禪額爾徳尼出家受格隆戒通曉經教史咒精微之義照從前能識一切喇嘛前往有利益地方叩拜於隴地方廟内將尊信隴集雅木沁彌勒佛神妙之像以銅範金自首裝飾下至於面造成一尊自在全備形像大法身是佛之像忽然傾斜巴勒布之匠衆人等俱不能修正聖識一切藴丹扎木素向是佛叩拜畧加省視告曰此佛像之首所對本廟梁脊貯一得道阿雜喇之屍佛像因避此傾斜耳即令登而視之果有人屍一具取而棄諸大江能識一切達賴喇嘛散花開光佛像復正如初顯示上項奇異之兆遂稱為知識一切藴丹扎木素瓦齊爾達喇達賴喇嘛一似從前達賴喇嘛聰敏已極廣建釋伽牟尼佛法幢闡揚前聖宗喀巴蘇瑪迪吉爾廸之教大地如日光普照矣欽定䝉古源流卷七
