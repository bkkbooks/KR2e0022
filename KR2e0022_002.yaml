  text: 欽定四庫全書欽定䝉古源流卷二
  hash: sha256:e36b14d93359030e13d701d58e960432e5e3541275c43d3eacdd21781d6ab9ab
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2e0022_WYG_002-1a, image: WYG0410/WYG0410-0563c.png}
body:
  text: 額訥特珂克土伯特䝉古汗等源流由是唪誦所供之多寶經禪教遂興自拉托托哩持年松贊達克哩年資克納木哩蘇隆贊凡四代合前三汗謂之妙音七汗納木哩蘇隆贊之子自從前戊子以來厯二千七百五十年嵗次丁丑必哩瑪托特噶爾福晉生一妙相具足端嚴之子頂紋顯具阿彌陀佛相昔者尼雅持贊博汗生一異相子因不能識擲之恆河既而悔之念此子究屬己子因愛惜之命名曰持勒德蘇隆贊以其頂紋所具阿彌陀佛用紅帛包裹不令人見至十三嵗嵗次己丑即汗位招服絶域衆汗等年十六嵗嵗次壬辰遣通密阿努之子大臣通密繖布喇並約其友十六人至額訥特珂克國中參究於是隨彼處之班迪達名德斡必特雅星哈者𫝊音韻之學復以所學之音韻互證土伯特之三十字母合入四聲於原三十四字內刪去十一字以其餘二十三字與土伯特始創之六字並原阿字定為三十字母各分音韻又編成八大經於是汗甚喜恱參究四年將禪經百拜懴悔經三寶雲經俱翻譯成文從此修明政治謂其地本係土伯特應以經教引導兼定刑法殺人者備受諸刑復行抵命偷盜者斷手虛僞者割舌屏去十惡罪欵奉行十善福事於是都內羣以為大悲觀世音菩薩出現能轉千金法輪之神聖競相稱揚咱噶喇斡倫汗蘇隆贊堪布之名揚於十方由是汗思一佛像即於意中變化一佛名曰噶爾瑪達迪僧人與汗相相肖頂上亦有阿彌陀佛汗復降㫖與伊云昔者拘留孫佛之時有大悲十一面觀世音菩薩自色究竟天下降化入額訥特珂克國星哈拉海邉界所埋之一蛇心旃檀樹根內於拘那含佛時發芽于迦葉佛時長成樹至今釋迦牟尼佛時花葉盛開果實成結自佛涅槃時又復倒枯為塵土所䝉今欲取出請此十一面觀世音菩薩至彼星哈拉海邉界彼處有卧象一羣中有一紅鼻大象伏卧耳墜一牛黃穗名曰阿蘭札斡爾達象驅令走避將所卧地掘開蛇心旃檀樹即在彼處付屬已此所化之僧遂藉神通力須臾到彼見實有羣象伏卧遂將象驅走象不肯逺去屹立等候將欲削其旃檀樹枝忽聞似有令其稍緩之聲於是自然化成之十一面觀世音菩薩即時顯露復於迦葉佛持受之花輪塔內又獲三佛舍利子甚多其阿蘭札斡爾達象作人語向化身云爾汗昔日曽求福於我今既遺忘又復向我顯然奪取我後世必轉一大力汗壞其教律遂設惡願等語于是奉菩薩像至進于汗並以大象之言具奏汗降㫖云吾前為額訥特珂克國蘇喀巴喇公主子時造成沙隆喀碩爾塔求福原有一負土行走之牛因遺忘未曽設願其牛甚怒遂氣憤設立惡願我於是亦另設誓願矣逮今世其象卧於大悲觀世音菩薩之上則姤心俱滅自易化服但欲化服此象仍須我躬是時汗意中方以普濟雪山所有生靈必須聖經為憂彼自然化生佛自兩目中射出霞光二道汗視之見一道光照射巴勒布國之巴喇木巴斡爾瑪汗之公主公主係甲申年所生年十六嵗面色潔白妙相具足端雅美麗體淨無瑕口吐優鉢羅香氣是莊嚴富麗之主也復見霞光一道照射中國唐朝太宗之女文成公主亦甲申年所生年十六嵗面貌慧秀妙相具足端雅美麗體淨無瑕口吐哈里旃檀香氣是通明經卷之主也於是汗欲求婚先遣大臣通密繖布喇噶爾丹巴二人往巴勒布國求公主為配訓以多方剛柔互用之䇿巴勒布汗即允所請以公主許配公主者乃白衣救度佛母之化身公主之來也以迦葉佛持受之昭不動金剛彌勒法輪及牛頭旃檀自然化成之白衣救度佛等三尊佛像及巴勒布各種經卷並齎至土伯特地方嵗次己亥汗年二十三嵗與巴勒布公主完婚於是復遣使求娶文成公主唐朝太宗亦如所請許之以公主平日供奉之釋迦牟尼佛及元祕術算各經歡心如意十三史復將種種寶玩錦繡財帛分給萬萬時汗年二十五嵗嵗次辛丑迎唐朝文成公主於土伯特地方完婚由是建立廟宇不可勝數令額訥特珂克國之桑吉喇必喇滿師巴勒布國之錫拉滿租師鄂斯達師及唐朝僧瑪哈德斡土伯特國大臣羅咱斡通密繖布喇及其弟達爾瑪古沙等翻譯經咒等卷帙屏去十惡罪欵將十善福事宣布於政令於是愚蒙之土伯特地方服其教者如仰旭日矣嵗次戊戌年八十二嵗各處𫝊揚兩公主及通密繖布喇噶爾丹巴并皆化入大悲十一面觀世音菩薩像內其長子莽蘇隴於父在時先歿次子恭蘇隴時年十四嵗係丙戌年生至是己亥即位壬子年二十七嵗歿有遺腹子對蘇隴生即嗣位至庚辰年二十九嵗歿其子持勒丹租克丹汗生於庚辰年次年二嵗嗣位至壬午年六十三嵗歿其子持蘇隴德燦時年十三嵗係庚午年生唐朝肅宗弟景德王女金成公主所出妙相具足至是嗣位汗與篤好經典深通法律之薩迦衮巴勒博且等五賢臣及內侍官商欲迎請堪布博迪薩都之事丙戌年十七嵗遂往薩和爾地方請堪布博迪薩都行至莽之公瑭山汗往見之遂迎至哈斯布哩山之宫殿居住商建法輪廟宇云我乃持行菩提心之人不能制服鬼怪若不先將本地鬼怪土神滅除何能安建廟宇欲降此等惟烏迪雅納國之巴特瑪繖巴斡師驅遣世界中神道羅剎八部精靈鬼怪無異奴𨽻乃深通密咒得道之至人師若肯來則鬼怪可以滅除汗云我何能迎師來此堪布博迪薩都云有可以迎來之因初額訥特珂克之蘇喀尚古哩氏女子曾於瑪哈蘇喀之尚古哩碩納尼舒古爾鼐之三姓生育三子女子歿後三子為母建立沙隴喀碩爾塔各行祈福尚古哩子首云我願藉此福來世為教中施主轉輪大汗即汗之前世因也次子云我願藉此福來世為一掌教大堪布即吾之前世因也三子云我願藉此福來世為一滅除壞敗我教之大塔爾尼齊即巴特瑪繖巴斡師之前世因也輔師行事之良友即今雅爾隴之嘉密克哩卜實諾延此皆前世設願所以可期必來汗聞言欣悅嵗庚寅年二十一嵗嘉密克哩卜什諾延遣使赴額訥特珂克迎請巴特瑪繖巴斡師師果如堪布博迪薩都從前所言云今已應我曩昔設願之期當即往彼不居此矣我前世止能集益於本身自不如以廣益於衆生為大因果今已届其期我身便如大鵬騰空即速飛往若徒事觀經斷不能飛騰矣言訖師立地前來至兩山險處見一大猛怪迎立巴特瑪繖巴斡師遂於空中趺坐口中念咒降伏其怪即震駭變一大兕忽生旋風攪雪至前師遂持九瓣鐡杵向兕面當頭力擊其兕即遁匿入山去風定雪消雲散天霽顯露山林日色晶融師乃䖍心持誦祕咒一遍擲杵鎮住厯將十二凶暴女魔及土伯特地方土神龍神盡行除滅驅遣鬼怪無異奴𨽻與汗持蘇隴德燦同將龍王烏巴納迪之地作為龍山辛卯汗年二十二嵗欲建廟築基分别祕咒之道及大檀城三藏之道倣照阿必達爾瑪祕咒及經史之道造成元妙金剛廟宇佛殿三重殿內所供諸佛多緣祕咒之道所成下一層肖土伯特形勢中一層肖漢地形勢上一層肖額訥特珂克形勢四大根本俱備其下三門為三世佛像中一門乃法身之像東四門具四無量四事之像凡此不可思議之轉輪元妙大剎中殿內供三世佛四面四角四大部洲八小部洲㑹萃驅魔之咒日月之象得力四大覺路及八瑪哈噶拉之大廟四大浮圖並光明塔共三十廟宇環以金輪先是有額訥特珂克潛伏海內之鄂丹達布哩廟宇今皆倣其式建造至癸卯嵗汗年三十四嵗工始完成於是通徹三世大智慧之巴特瑪繖巴斡並得道之大堪布博第薩都塔爾尼齊達爾瑪吉爾迪等持散天花開大歡喜筵凡三年至甲辰汗年三十五嵗邀集同教法衆二十五人向髙行巴特瑪繖巴斡處練習祕咒求受諸佛言宗㫖及七百二十佛之灌頂於是依所請給與祕咒其名虛空藏之格隆能駕日光布特達音扎納能將鐡杵嵌入石峯馬明王佛能三作馬嘶聲尊勝海慧空行母能活死人能撫育德慧空行母等威儀獅子神能驅遣鬼怪無異奴𨽻必嚕咱納克勒穆爾齊能顯慧眼永奉國主於世通徹玉扎寧博之經音扎納固瑪喇能施示神變都特都勒多爾濟如風行無礙音扎納郭哈雅能騰空飛行錫哩德斡能手搏猛獸音扎納錫喇卜能如鳥飛騰錫哩尼達能浮行水面達爾瑪哩斯密能默識不忘錫哩星哈能使流水洄溯德斡蘇迪能變枯骨為金徹崇羅咱斡能手捉空中飛鳥贊扎噶能乘猛兕納干達喇能如魚遊海水中瑪哈喇特納能食磚石如米穀錫哩巴咱爾能馳走山峯拉迪喇特納能發雷如射矢咱雅薩多能於虛空趺坐凡此顯示多方得道之驗於是始見虛空藏金剛手清淨佛佛慧威羅斡金剛佛尊勝馬明王佛持國最勝王佛尊勝海慧空行金剛頂佛威儀獅象世尊稱讃佛妙慧空行離垢佛毗盧遮那智藏持咒救護佛等八大佛之光由是以土伯特語譯額納特珂克文字雖選土伯特童子教授終不得一善學者巴特瑪繖巴斡師甚憂之遂親往尋善學童子至一家門前見一七嵗童子向其詢問答云父母俱不在家維時師正欲憩息遂立行幄留憩將童子喚至詢以汝父何往答云父往尋言語又問汝母何往答云母往尋眼目少頃其父沽酒歸童子指云此是尋言語去者蓋謂飲酒後則言語煩瑣也又指其母買歸燈油云此是尋眼目去者蓋謂㸃燈可照昏夜也師不勝欣悅遂攜其童子回汗降㫖云此子蓋古昔阿南達之化身今為巴喇古爾根敦之子名巴喇古爾必囉咱納之童子是也遂教以額訥特珂克語未幾肄習貫通遂稱為土伯特之墨爾根羅咱斡必囉咱納嵗甲辰汗年三十五嵗巴特瑪繖巴斡師與額訥特珂克之必瑪拉瑪迪巴勒布之必噶瑪拉錫拉土伯特之墨爾根巴喇古爾羅咱斡必囉咱納卓克囉壘嘉勒燦班迪伊錫德噶斡巴勒則克及漢僧瑪哈雅納等將經咒卷帙通行翻譯各處𫝊揚為神童文殊之化身轉千金法輪建中之咱噶喇斡掄汗持蘇隴德燦在位五十七年嵗戊寅年六十九嵗歿其長子穆尼贊博中毒被害次子穆嚕克贊博遣往邊地幼子穆迪贊博生於丙辰年嵗己卯年二十四嵗即位於瓊地方建立金剛圓覺等三廟在位三十一年稱為薩特納埒克俊咱噶喇斡掄汗此汗與額訥特珂克國之達爾瑪巴拉汗及唐朝之懿宗三人俱一時所生嵗己酉汗五十四嵗歿其子臧瑪達爾瑪持松壘羅壘倫多卜等兄弟五人長子臧瑪出家為僧次子達爾瑪持松自前嵗次戊子紀二千九百九十九年之丙戍年所生嵗戊戌年十三嵗各衆大臣㑹議輔立即位嵗壬寅年十七嵗時行兵于漢地擊敗唐朝肅宗大有所獲威勢益增由是建造千座廟宇令額訥特珂克之烏巴迪尼扎納瑪達錫納勒達博迪薩都達納錫拉布達密達及土伯特之烏巴迪喇特納喇克資達達爾瑪錫拉卓克囉壘嘉勒燦衮巴勒布齊之子衮壘旺博等將從前未譯經卷俱行翻繹按盈髮之數各繫一哈達每哈達各坐一僧供奉不竭推崇禪教以經典之道惠養土伯特人衆維時土伯特國遍享太平因與聖境無别故稱其君為末世之大力金剛手菩薩化身轉千金法輪之持喇勒巴展咱噶喇斡掄汗烏遜繖達里在位二十四年嵗辛酉年三十六嵗歿自丁未年肇興禪教始至此辛酉年厯四百九十五年汗無子其兄達爾瑪係癸未年所生嵗壬戌年四十嵗即位因其從前在世為象時曾設惡願二十四年之問惡習相沿遂𫝊稱為天生邪妄之朗達爾瑪汗將大乘三藏以下下乘以上之三乘及四項僧人俱行殄滅殘毁禪教嵗己酉綏英阿汗年六十三嵗因值其另行設願之時蘇隴贊堪布汗之化身拉隆巴勒多爾濟將喀鼎白馬用墨隆黑反著青裏白舞衣匿弓矢於袖中來與汗叩拜初跪時搭矢再跪時開弓三跪時發矢射中汗之心窩於是云是如風之揚塵土之塞水水之減火大鵬之制龍金剛之破石神之制阿修羅佛之降魔怪故我將綏英阿汗刺殺遂正穿白衣洗淨白馬乘逃巴爾喀木地方而去朗達爾瑪之五十三嵗時嵗己亥所生子曰鄂特蘇隴年十一嵗嵗己酉即位經教盡廢在位五十三年嵗次丁丑年六十三嵗歿其子巴勒科爾贊係伊父五十一嵗己丑年所生至辛丑年十三嵗即位因值敬奉經教中興之時建立八大廟宇篤好禪教在位十八年嵗己未年三十一嵗歿生有二子一名扎實則克巴一名尼邁衮扎實則克巴子三人巴勒德鄂特德濟特德為衛藏四大地方之汗尼邁衮子三人巴勒衮扎實衮德租克衮前往阿哩等三部落稱為古格姓氏汗逮後推廣禪教有自下推廣自上推廣二種其自下推廣者乃朗達爾瑪汗殘毁禪教之時錫勒巴蘭咱庫爾納巴蘭咱錫拉木繖巴斡錫拉瑪迪音扎納瑪迪巴咱爾舒斡喇與巴蘭咱星哈傲依阿斯達兄弟二人及烏巴迪尼錫達等十人前往尼斡克丹迪克地方見一破廟僅剩一釋迦牟尼佛遂於此佛前漢僧瑪哈雅納座下出家由是遂復回來令髙行拉展為堪布格韋絅鼐為闍黎釋迦牟尼喇嘛為教授並二僧共為五格隆受持格隆之戒於衛藏四大地方復行廣推禪教其自上推廣者緣尼邁衮次子扎實衮生二子曰庫壘隴吉長子庫壘係從前戊子年以來紀三千一百二十三年之庚寅年所生後因為僧遂稱為賚喇嘛葉舍依鄂特嵗壬辰生固格羅咱斡琳辰藏博至甲寅嵗喇嘛葉舍依鄂特年二十五嵗建立托凌廟遣羅咱斡琳辰藏博等二十五人往額訥特珂克將班迪達噶達噶爾瑪達爾瑪巴瑪喇固巴達請至將經藏祕咒四項紀略盡行翻寫謂之推廣禪教次子隴吉即汗位其子額卜朗沙嘉依鄂特因其為僧遂稱為遵巴沙嘉依鄂特隴吉汗遣納克磋羅咱斡粗勒持木嘉勒斡二人往額訥特珂克之南先是錫哩咱噶達之子迪巴木噶喇錫哩罝納亦係自從前戊子年以來紀三千一百二十七年之甲午年所生彼時昭阿迪沙師已六十一嵗亦於甲午年請來遂將從前未有之經翻譯而禪教益雅廣矣扎實則克巴次子鄂特德之子扎實德汗奉請喀齊班第達罝納錫哩令崇布吹遵固納羅斡咱羅丹錫喇卜二人翻譯經卷尊崇禪教其興教也約分二㑹其先興者起自辛酉壬戌年至丁亥凡八十六年其後復興則自丁亥戊子年始欽定蒙古源流卷二
