body:
  text: 額納特珂克土伯特䝉古汗等源流由是汗降㫖云承王皇上帝汗父之命駕馭天下十二强汗平定諸惡劣小汗有勞大臣官員等贊成大事今須養息身心自戊辰年起至丙戌年安居一十九年政脩統敘鴻章鞏固上下安居君臣黎庶共享太平又降㫖云一者先曽有言布告二者今惟唐古特人衆尚未歸附先是錫都爾固汗之黒鼻黄犬能知先兆將九斿白纛請出設立行兵三年其犬若無敵時則好聲緩吠若遇有敵則嚎因知汗欲加兵遂嚎三年而錫都爾固汗以此犬既老無先兆矣未加防範嵗次丁亥三月十八日行兵唐古特之便于杭愛汗地方設圍汗以神機降㫖云今圍中有一郭斡瑪喇勒有一布爾特克沁綽諾出此二者毋殺有一騎青馬之黒人可生擒前來遂遵諭將郭斡瑪喇勒布爾特克沁綽諾放出將黒人拿至汗前汗問曰爾係何人所屬因何至此答云我乃錫都爾固汗屬人遣來哨探者我名超諸唐古特素號善馳之黒野豕今殆我黔首將滅之時乎束手就擒此青馬素負庫斯博勒特之名衆畜莫能及今豈四蹄疲軟乎何並未動轉遂爾被擒汗降㫖云此人果係丈夫遂未殺又問云人言爾汗向稱呼必勒罕彼果如何變化答云我汗清晨則變黒花蛇日中則變斑斕虎晩間則變一童子伊㫁不可擒忽于途間有近侍博果勒巴沁者以汗之弟哈薩爾㑹飲之際曽握和蘭哈屯之手奏聞于汗汗遂遣博果勒巴沁向哈薩爾索取大皂鵰翎哈薩爾云今以臨御大衆之君索取大皂鵰翎因將上好大皂鵰翎呈獻云是舊物不受而去又命射取骨頂哈薩爾見骨頂飛來問博果勒巴沁云自為首者起當射第㡬對云於黄黒之間射之因射㫁鼻梁以獻之而却之曰汗所喜者索取大皂鵰翎耳此係骨頂且被血汚又不受而去汗於是發怒望見穆納地方降㫖云此乃廢國當隠避太平當優遊宜獵捕麋鹿以為休息老人之地正談論間忽一鴟鴞鳴於樹杪汗疑之呼哈薩爾云為我射此惡鳥哈薩爾遂射之矢發鴟鴞飛去適有一鵲落下遂被射殺汗因嗔責云前此爾與多倫鴻郭達同専征伐曽索取大皂鵰翎吝惜弗予今令殺此惡劣鴟鴞反殺祥瑞之鵲因縛執哈薩爾派四人看守之爾時烏爾魯克諾延奏云吾主亦知妙繪每變色於惡染賢徳多受惑於小人之私乎將以惡劣鴟鴞移禍於祥瑞之鵲乎乞將弟哈薩爾恕免汗雖以為是因未釋先入讒譖之言遂未赦至唐古特地方將圖爾黙格依城圍困三層有善法術之哈喇剛噶老媪在女牆上摇動青旗施鎮壓之術倒斃騸馬二羣蘇伯格特依巴圖爾奏汗曰吾主今軍中騸馬將盡試令哈薩爾出射之汗以為然将備用之淡黄馬給哈薩爾乘騎令其發矢哈薩爾即指老媪之膝葢射之應弦而斃錫都爾固汗遂變為蛇汗即變為鳥中之王大鵬又變為虎汗即變為獸中之王獅子又變為童子汗即變為玉皇上帝錫都爾固汗勢窮被擒遂云若殺我則害於爾身若免之則害及爾後裔汗云寧使我身被害願我後裔安善因用箭射刀砍俱不能殺錫都爾固汗云任爾以諸般鋒利之物砍我無妨惟我靴底中蔵有三折密薩哩鋼刀方可刺砍遂捜取其刀又云爾等殺我若我身乳出則害於爾身若血出則害及爾後裔再古爾伯勒津郭斡哈屯爾若自取可將伊身邉詳細捜看遂將彼之密薩哩鋼刀砍其頸殺之乳出即取古爾伯勒津郭斡哈屯并佔據密納克唐古特人衆又欲在彼阿勒台汗山之陽哈喇江岸邉過夏其古爾伯勒津郭斡哈屯甚美麗衆多竒異之古爾伯勒津郭斡哈屯云從前我之顔色尚勝於此今為爾兵烟塵所䝉顔色頓減若於水中沐浴可復從前之美麗于是令其洗浴古爾伯勒津郭斡哈屯前往哈喇江岸邉沐浴時有其父家中豢養一鳥遶空飛至因獲住向隨去人曰吾為爾等羞爾俱留於此吾獨往沐浴言訖遂往寫書云我溺此哈喇江而死母向下游尋我骨殖可向上游我尋因將書繫於鳥頸而遣之出浴而回顔色果為増勝是夜就寢汗體受傷因致不爽古爾伯勒津郭斡哈屯乘便逃出投哈喇江而死從此稱為哈屯額克江云後其父因寧夏趙姓女子沙克扎旺節所寄之信來尋骨殖不獲僅得純珠縁邉襪一隻令每人擲土一遂稱為鐵蘆岡云汗自受傷後漸致沉重彌留之際降㫖云命矣夫静好之布爾徳福晉墨爾根哈屯寵眷之和蘭濟蘇濟蘇凱三人輔翼可嘉之庫魯克博郭爾濟諾延同著勞績之伊遜烏爾魯克如庫徳爾等四弟如庫魯克等四子以及如庫哩之官員諾延等我府庫之充盈我國家之大統我之哈屯後裔我之僕從諸人我之土地均可惜也語竟遂爾昬暈蘇尼特之吉魯根巴圖爾奏云尤可惜者布爾徳福晉墨爾根哈屯其死矣大統其亂矣兄弟哈薩爾伯爾格特依其心懐離愁矣屬下黎庶其流散各處矣結髪之布爾徳福晉墨爾根哈屯其死矣崇隆之政體其凌替矣噫烏格徳依托壘二子其孤矣萃聚之僕從諸人其減矣布爾徳福晉徹辰哈屯其死矣兄弟諤濟錦哈濟錦二人殆不聊生矣教養可恃之人衆其離散矣負異出衆之博郭爾濟莫和賚二人其苦矣前至杭愛汗山之隂妻子皆涕泗來迎矣汗今何往衆皆哭望汗之降臨矣汗復甦降㫖云孀居之布爾徳福晉墨爾根哈屯失恃之烏格徳依托壘二孤子爾其殫正直之心竭誠輔翼永逺勿替在爾等美玉無玷純鐵無銹甚可珍惜此身固無常要當堅持剛强不退縮之念爾等果克成其事即事之始也言語果極其實即心之誠也尚其小心奉行共襄和順噫我辭世去矣㓜子呼必賚言語簡明大小事宜爾等共遵其言而行日後自能令爾等安居悉如我身在時降㫖後殁於圖爾黙格依城時嵗次丁亥七月十二日享年六十六嵗於是以輦奉柩屬衆人等步行哭送蘇尼特之吉魯根巴圖爾哭云我君其如鷹颺而髙飛乎我君豈以此輦汚穢而昇遐乎我君果遺棄妻子乎我君果抛置僕從乎我君如鴉鶻之摶擊而去乎我君如纎草之因風飄蕩乎我君享年六十六嵗豈臨莅九色人等而逍遥以往乎啼泣而行至穆納之淖泥處所車輪挺然不動雖將五色人等之馬駕挽亦不能動舉國人等正切憂虞蘇尼特之吉魯根巴圖爾又奏曰永承天命生此人主今遺棄大統及僕從人等聖主其超生長往乎君原配之福晉所治之統敘所立之政事所都之國邑俱在彼處天命之福晉金闕殿亭純備之制統收集之人衆與習居之地沐浴之水統屬僕從䝉古人等九烏爾魯克衆官員等游牧之鄂嫩徳里衮布勒塔干等處棗騮馬鬃所製之神位聚積各種適意中節之鼓銅鑼畫角𤨏呐金亭登基之克嚕倫地方亦在彼處發祥之先所遇之布爾徳福晉哈屯有福之布爾噶圖汗游牧處所寵眷優渥之博郭爾濟莫和賚二人並極盛之政統亦在彼處䝉神引遇之和蘭哈屯福晉及胡笳胡琴諸般樂器汗之徳美濟蘇濟蘇凱二福晉並一切金亭殿屋亦在彼處豈以哈爾固納汗山融暖以唐古特人等衆多以懐蓄惡念之古爾伯勒津郭斡哈屯美麗反將昔日之屬衆䝉古等棄擲乎今萬金之軀雖不能保但請將如寶玉靈竒之柩使大福晉布爾徳哈屯一見以慰屬衆之望祈汗仁愛鑑照奏畢輦因徐徐轉動於是羣下咸感戴稱竒遂至所卜久安之地自哈屯福晉以及台吉屬衆均哭泣極哀因不能請出金身遂造長陵共仰庇䕶於彼處立白屋八間在阿勒台山隂哈岱山陽之大諤特克地方建立陵寢號為索多博克達大明青吉斯汗其名遂留𫝊至今云所生察干岱珠齊烏格徳依圖類四子並徹辰徹徹肯公主共弟兄五人汗在時令長子察干岱於俄羅斯地方即汗位次子珠齊於托克瑪克地方即汗位三子烏格徳依留守汗位㓜子圖類守産汗在時即殁烏格徳依係丁未年降生嵗次戊子年四十二嵗即汗位欲往請薩斯嘉扎克巴嘉木燦因事耽延逾六年嵗次癸巳年四十七嵗殁子庫玊克庫騰二人長庫玉克乙丑年降生嵗次癸巳年二十九嵗即汗位在位六月是年即殁次庫騰丙寅年降生嵗次甲午年二十九嵗即汗位嵗次乙未因龍祟侵魔患病多人胗視不能痊愈術窮因議及西邉地方有竒異通曉五識名薩斯嘉恭噶嘉勒燦喇嘛延請醫治庶㡬有益遂令韋瑪郭特之道爾達達爾罕為首往請帕克巴巴喇宻特者係自前戊子年以來紀三千三百七十五年嵗次壬寅降生至戊辰年二十七嵗往額訥特珂克與左道六師之異端講論辨難窮其詞獲班第達之號而歸其叔父扎克巴嘉勒燦喇嘛曽告之云日後有東方帽若棲鷹靴似猪鼻屋似木網娓娓長音語須三四譯者係䝉古國君博迪薩多之化身名庫騰汗遣使名道爾達者請汝汝必往行當於彼處大興佛教因示卦驗適與之合時六十三嵗於甲辰年起程至丁未年六十六嵗與汗相見造成獅吼觀音收服龍王仍與汗灌頂頃刻病愈衆皆歡喜即遵帕克巴巴喇宻特之言而行所有邉界䝉古地方創興禪教嵗次辛亥帕克巴巴喇宻特年七十嵗圓寂庫騰汗在位十八年亦於辛夘年殁享年四十六嵗喇嘛與汗二人同年而逝其圖類汗之蘇喇克台伯啓太后生莽賚扣呼必賚額哩克布克等四子長莽賚扣係丁卯年降生嵗次壬子年四十六嵗即位在位八年嵗次己未殁享年五十四嵗次呼必賚徹辰汗乙亥年降生嵗次庚申年四十六嵗即位嵗次甲子年五十嵗越八年辛未夏則居上都克依綳庫爾圖城冬則居大岱都城併阿勒台北之察罕巴勒噶遜額爾楚吉地方之蘭亭共造四大岱都城居住整肅屬下平定四大國四境不累八方無擾服馭有衆與羣黎共享太平再帕克巴巴喇宻特之姪瑪廸都斡咱係乙未年降生嵗次辛未年十三嵗時隨伊叔父而來嵗次戊子年三十嵗呼必賚徹辰汗之福晉呼必勒罕秦貝郭斡哈屯奏汗云此瑪廸都斡咱乃嗣續我喇嘛之人可令其持受喜金剛之灌頂汗雖然之自嫌坐於此童子之下令詢此童子若我坐於床上令其坐於下面給與灌頂則受之不然如何可受灌頂於是哈屯前往降汗㫖諭於瑪廸都斡咱彼云從前以灌頂治化入於金剛蔵嗣復得解脱二乘菩提道之大利益喇嘛顯屬斡齊爾達喇佛如何可坐於汗之下由是枘鑿不入矣秦貝哈屯心甚憂之復向喇嘛云𫝊經持受灌頂之時喇嘛坐於床上令汗坐於下靣辦理政事之時汗與喇嘛俱坐於床上似此如何彼此俱以為可由是汗降㫖云自明日為始瑪廸都斡咱托音我二人可將功徳喜金剛根本之義講解演説於次日互相問難乃汗所問之言瑪廸都斡咱不能領悉意甚彷徨遂謝以明日再講起而去葢因帕克巴巴喇宻特所持之喜金剛根本經卷在汗處瑪廸都斡咱未曽得見竟夜愁思不寐倐爾困倦見一皤然白髪老人髻上挿一人骨畫角形似婆羅門警之曰爾勿憂心可㸃燈一盞預備言訖而去少頃又見前老人持書一本前來云将此速看留心記憶天明以前我仍須持去安放言訖復不見瑪廸都斡咱反復詳閲三次正在存記已至黎明果見老人前來云此書看完我即持去安放又云爾昨日因注想將喇嘛請坐於南向空中對靣相向故講究時未能制勝今日可注想將喇嘛請於頂上其靣向外如此講究則汗不能與汝為匹矣禱祀喇嘛時則對靣相向講究時可想其靣向外言訖又復不見此乃有根基之薩斯嘉師徒之䕶法綽克托瑪哈噶拉之神竒變幻將汗處之功徳喜金剛根本經持取前來以示之也次日講究時大汗未能與瑪廸都斡咱為匹於是心甚篤誠將通備功徳喜金剛之四灌承受贈以土伯特語謂之喀木蘇木垂濟嘉勒布喇嘛帕克巴漢語謂之三省大王國師䝉古語謂之古爾班噶扎特達竒諾們哈罕烏勒木濟喇嘛滿洲語謂之伊蘭巴伊諾們汗綽勒郭囉科喇嘛封號將秦貝哈屯之父黙爾格特之蘇爾噶圖瑪爾噶察所獻圓大如駝矢無瑕無孔之珠設於百兩金壇城之上呈獻復於千兩銀壇城之上設金製須彌山四大部洲日月七珍八寶又將金銀琉璃等寶以及綾縀錦繡財物並象馬駝隻等牲畜呈獻無算幷塞勒木濟城之人衆一同獻納由是昏昧之䝉古地方佛教昭然如日矣自額訥特珂克地方將佛並佛之舍利四天王所獻之缽盂旃檀木製造之昭佛請至遵照經文施行十善福事以治天下安享太平人咸稱為轉千金法輪之咱噶喇斡迪徹辰汗在位三十六年嵗次庚申享年八十二嵗殁徹辰汗之秦貝哈屯生多爾濟莽噶拉精吉木諾穆罕四子一女齊齊克先於庚辰年徹辰汗年六十六嵗時帕克巴喇嘛年四十六嵗將回家汗降㫖云我四子内誰往送此寶貝喇嘛至家日後令即汗位二兄俱不願往惟第三子精吉木台吉云我願報父恩前往遂送帕克巴喇嘛行至䝉克地方而殁汗云我前已有成命於精吉木之三子噶瑪拉達爾瑪巴拉特穆爾弟兄三人親為諦看以特穆爾克承治統遂將第三孫特穆爾於汗在時令其即位特穆爾汗係乙丑年降生嵗次甲午年三十嵗即汗位後伊祖殁自丁酉年起纉承治統供奉有名之薩斯嘉滿珠郭喀喇特納格都喇嘛照前整立二政以四大道致民人於太平纉緒十一年嵗次丁未年四十三嵗殁嗣達爾瑪巴拉之子海桑辛巳年生嵗次戊申年二十八嵗即位命有名之托音垂濟鄂特色爾之羅咱斡僧人將史咒各經繙譯大半以道教惠養大衆在位四年嵗次辛亥年三十一嵗殁弟阿裕爾巴里巴特喇汗乙酉年生嵗次壬子年二十八嵗即位供奉有名之薩斯嘉錫哩巴達喇嘛仍遵前政宏圖永固在位九年嵗次庚申年三十六嵗殁子碩廸巴拉汗癸卯年生嵗次辛酉年十九嵗即位供奉有名之薩斯嘉布特達錫哩喇嘛以道教休養大衆驅逐唐古特之持卜贊汗以定密納克之衆在位三年嵗次癸亥年二十一嵗殁嗣噶瑪拉之子伊遜特穆爾汗癸巳年生嵗次甲子年三十二嵗即位令薩斯嘉布尼雅巴達及䝉古師羅咱斡錫喇小僧格二人将從前未譯之經繙譯在位五年嵗次戊辰年三十六嵗殁海桑汗之長子和錫拉汗庚子年生嵗次己巳年三十嵗即位在位四十日即於是年殁弟庫色勒汗乙巳年生嵗次己巳年二十五嵗即位在位二十日即於是年殁嗣阿裕爾巴里巴特喇汗之子托克特穆爾汗甲辰年生嵗次己巳年二十六嵗即位敬奉有名之薩斯嘉阿難達巴達喇嘛崇祀昭釋迦牟尼佛於上方福地大施金銀寶貝於釋迦牟尼佛法極加敬重修明道教在位四年嵗次壬申年二十九嵗殁嗣庫色勒汗之子額琳沁巴勒丙寅年生嵗次壬申年七嵗即位在位一月殁托克特穆爾汗之子托歡特穆爾烏哈噶圖汗戊午年生嵗次癸酉年十六嵗即位供奉有名之薩斯嘉阿難達瑪第喇嘛遵依從前道教而行遂賴道教獲享安逸嵗次甲申漢人朱姓之子朱葛生時其家見五色虹光彼時阿爾拉特之博郭爾濟諾延後裔拉哈之子伊拉呼丞相奏於汗云常人生時能有此兆乎此子必異人也應乘其年㓜殺之汗以其言為非未殺其子伊拉呼丞相又奏云今不聽吾言恐遺害於將來矣若此子長成禍將叢生後其子長成賦性警敏汗甚愛之降㫖將右省人衆令托克托噶哈哩常父子二人為長以領之將左省人衆令朱姓之子朱葛布哈弟兄二人為長以領之因將左省佔據於是朱葛諾延與一漢人號司馬平章之内大臣夤縁固結令其在汗前以托克托噶太師心蓄異念搆結外人之語以讒譖之是夜汗復夢見一鐵牙野豕突入城中欲嚙衆人之際因不得路遂各處抵觸奔走又見日月同墜次早即以是夢告知漢人王先生令其詳解伊云此將失汗位之兆也汗恚以何為出此怪異之語遂詢問阿爾拉特之伊拉呼丞相伊拉呼丞相云固為好徴我前未嘗言之乎在在飛塵並烽烟四起汗以此童子年㓜何知因召洪吉喇特之托克托噶太師詢問太師答云鐵牙之豕朱姓為亂之兆日月同墜乃汗與奴僕無分之兆也汗問云今當何以禳之答云前伊拉呼丞相之言甚是今從照伊之言惟將朱姓人殺戮此外别無别䇿汗意以太師乃大人葢亦側目我重用朱葛故為此以譖之耳遂不殺朱葛聞其言與前結好之司馬平章並委心腹肆行讒惡托克托噶太師聞之屢言於汗因汗不信從乃云此我厄運非吉徴也遂益加防範詎朱葛諾延差人往試托克托噶太師太師預知乃設一計於門前用一木槽貯水水中貯砍碎木植數塊上置剃頭刀一把并牛毛一縷所遣之人來至審視而去白曰並無别言惟門上貯放上項物事云云朱葛諾延㑹其意曰木槽所貯之水有如大海乃譬言大國是也砍碎之木如海内之舟乃譬言汗與大師諾延宰桑等是也剃刀牛毛者乃言其利如剃刀其細如牛毛譬言汗之法度是也又轉念似此有智之人如不用計殺之伊諸事皆能洞知㫁不可留遂告知司馬平章令復轉奏云托克托噶太師實有惡念於汗試召伊前來齊集看其來否則可知矣遂遣司馬平章往召太師至半路而回云召太師不至汗曰此有惡念信矣不然何為不至耶於是令司馬平章帶兵往殺托克托噶太師司馬平章將衆兵留於錫囉干城獨往見太師云有密㫖潛告云有人奏汗言大諾延有惡念於汗因未知虛實降㫖令召太師商議太師雖知其計因時已至不可避遂往司馬平章曰我先往預備牲畜若有遲滯則汗怪我遂先往備兵太師至遂引入殺之回奏於汗汗降㫖將現在左右省所有人衆令朱葛管轄令司馬平章叅知政事朱葛奏云承汗惠愛重恩我豈忍安居於室若令㣲員前往未免擾累屬衆我願親身往收貢賦汗甚喜悦允其行由是朱葛三年不至汗怒甚嚴諭司閽人云朱葛去久伊若來時勿令入城汗一夕夢一白髪老人來云爾自殺守城之犬任狼自外馳來是何意見因大怒嗔責瞬目不見次日汗因夢疑懼思所謂自己之犬者其殺托克托噶太師之謂歟所謂外靣之狼者其朱葛外出之謂歟遂告知阿難達瑪第喇嘛喇嘛良久無語徐奏云按曩昔我尊勝喇嘛具五識極至之帕克巴巴喇宻特所造法語寶蔵素布錫達史内有雖將已友為仇尚屬有益若將他仇為友殊為可畏之語今將如守城之犬托克托噶太師殺害將如馳走之狼朱葛信任此夢之預示凶兆也汗問曰今如何方能濟之喇嘛奏曰從前呼必賚徹辰汗時我崇上法王帕克巴喇嘛坐泣三日汗問曰喇嘛爾何故大泣答云汗非為我二人之時也後九世十世時降生托衮汗伊等必毁滅我二人之教是以哭泣汗云喇嘛爾如此少年何以知此逺事答云汗不獨此也且知曩時此地曽下七日血雨汗遂檢查古書一冊内載昔時中國唐太宗時此地曽下血雨七日故額訥特珂克之托克黙特師之弟蘇班都師之徒向唐朝之漢僧元裝羅咱斡云非爾之時也爾後十餘世爾之戚中降生唐英襲王汗方為運行爾道之兆其書一冊閲訖汗較前益加敬奉信服似此聖卦示驗至時誰能阻抑耶惟願汗向髙明喇嘛禱祝誠禮三寶䖍祝本身䕶法庶可為挽汗怒降㫖令喇嘛爾今且回原處喇嘛喜甚云當此金甌永固玉燭常調之時令我回家非汗之㫖乃喇嘛之幸也遂束裝而去欽定䝉古源流卷四
