body:
  text: 額訥特珂克土伯特蒙古汗等源流由是圖伯特地方之胡土克圗與墨爾根喇嘛等共議以蒙古地方竟無繼續達賴喇嘛掌教坐床之喇嘛乃揀擇巴特瑪三博斡巴克什之髙徒大慈津巴扎木蘇之呼必勒罕根敦巴勒藏扎木蘇實哩巴達喇嘛係壬辰年生年十二嵗遣往蒙古地方嵗次甲辰年十三嵗到彼即坐聖識一切斡齊爾達喇達賴喇嘛索納木扎木蘇於蒙古地方所設之床普衆遂稱為大慈邁達哩胡土克圖嵗次丙午年十五嵗阿勒坦汗之姪婦托克對瑪齊克布延圖達賚哈屯用各色寶石造成彌勒佛像懇請開光喇嘛乃持誦祕密壇城散花之際天降花雨衆皆目覩慧光照臨有緣人衆無不仰見嵗次辛亥年二十嵗烏嚕固特之達賚烏巴什諾延為廟宇開光來請石上顯露足迹衆皆稱異其從前鄂爾多斯之博碩克圖濟農三十二嵗嵗次丙申行兵西圗伯特地方招服古嚕索納木扎勒之沙喇衛郭爾修明經教之事未易言罄嵗次丁未年四十三嵗始將昭釋伽牟尼佛十二嵗之相用諸寶金銀合成佛像又將各種供器旗幟全行修造至嵗次癸丑年四十九嵗造成嵗次甲寅年五十嵗以正月十五日係佛大示變化之日懇請邁達哩胡土克圗散花開光大降花雨顯示吉祥瓦齊爾托密公固實青斡大固實鍾多里衛徵之子扎什衛徵台吉三人商議尊上邁達哩胡土克圗以大慈諾們汗之號因給阿哩克綽爾濟號為達賚綽爾濟公固實號為灌頂大王固實大固實號為約噶匝哩固實與綽爾濟等一體給與床坐又分别給與大小胡巴拉克名號仍矢誓願與諾們汗世世相遇並上博碩克圖濟農號為轉金輪咱噶喇斡爾迪徹辰濟農汗上台噶勒鍾錦福晉號為達喇博迪薩都諾木齊達賚徹辰鍾錦哈屯稱其叔為莽固斯楚古克爾岱洪台吉稱左翼扎什號為衛徵洪台吉稱恩克和碩齊為洪台吉右翼之庫圖克台徹辰洪台吉之長姪巴圖洪台吉之子薩納囊台吉甲辰年生年十一嵗因係六國肇興道教人之後裔指伊始祖名號給與薩納囊徹辰洪台吉之號年十七嵗位列大臣之職任以政事大加寵眷稱莽固斯呼拉齊號為額爾德尼呼拉齊洪台吉稱徹辰岱青之長子薩迪徹辰岱青號為固實洪台吉稱次子徹辰號為巴圖爾洪台吉稱岱綳之姪烏巴什號為都噶爾岱青其衆大臣塔布囊官員等酌量大小挨次給號致四大國于太平登衆庶于衽席焉嵗次辛酉年五十七嵗因議明地榆林城之事差往之使臣六十人被害濟農汗發怒與御前衆大臣官員等公議遂統兵十萬由榆林城西烏拉罕柴扎地方進逼章衮城圍困三日城中為首之漢官七員獻書云我等向我首領都堂等商議請暫解圍濟農汗然之撤兵而回至保安城有寧夏榆林二城之總兵引兵二萬來戰特固爾格之莽固斯楚古克爾諾延之長子博克班洪台吉單騎衝入其營馬被鎗斃身幾被擒用刀擊敗來犯之人舞刀以出是時拉瑪扎卜塔布囊額爾克塔布囊兄弟二人伯爾克宰桑博羅特哈坦和碩齊四人隨後一同殺入正欲結營之際見博克班洪台吉持轡而來遂結大營共謂今日天晚收兵駐劄明日再戰是夜周圍固守天未明敵人已遁遂俘獲無算振旅而回嵗次壬戌圖默特之鄂木博洪台吉之使臣博爾拜侍衛諾延塔拉圖丞相濟雅噶圖侍衛通事三人與鄂爾多斯之莽固斯洪台吉布延岱徹辰卓里克圖薩納囊徹辰洪台吉三諾延議政每年進濟農汗銀共三千兩每月銀二百五十兩復抵償所殺之六十人給銀六百兩其辦理政事之大臣官員塔布囊等另為賞賚由是治道輯寧嵗次癸亥年五十九嵗交阿哩克達賚綽爾濟録完金字甘珠爾經令拉克巴胡土克圖開光供奉又許願前往西宗喀巴之肆納囊蘇處敦請丹珠爾經至嵗次甲子年六十嵗殁其妻岱罕達喇博迪薩都諾木齊徹辰鍾錦哈屯作百日善事於夀終之地將昭佛寶像用銀造成又用銀千兩及各種寶石造塔將汗之尸骸焚化裝入供獻於昭釋伽牟尼佛廟內衆官商議欲遣人前往西藏之昭釋伽牟尼佛各廟熬茶自能識一切達賴喇嘛以至衆胡土克圖均給與幣帛以祈福緣汗之子䇿凌額爾德尼洪台吉林沁額葉齊岱青圖巴台吉吹拉台吉弟兄四人內第三子圖巴台吉曰我報父恩情願前往伊母然之即於是嵗遣往長子䇿凌額爾德尼岱青洪台吉辛卯年生嵗次丙寅年三十六嵗即位六閲月即於是年殁其時圖巴台吉前至西藏四處叩拜博克達班禪額爾德尼并能識一切達賴喇嘛自昭釋伽牟尼以及各廟均行散福博克達班禪額爾德尼在宗喀巴蘇瑪迪吉爾迪之噶爾丹廟內唪誦宗喀巴世代源流博克達班禪者係曩昔釋伽牟尼佛之弟子名蘇布迪乃大乘聲聞之羅漢傳授金剛經在東方沙木巴拉地方稱為特古斯伊扎固爾圖汗大作功德轉輪傳法于是化為主持額訥特珂克地方之納噶租納巴克什之髙徒巴貝噶喇托音以闡揚善旨烏巴迪斯之本又化為額訥特珂克之瑪噶達地方之阿必雅噶喇烏巴達尼隨約噶尼佛母得識不畏涅槃之道通徹各種經史凡講經論道至於至極又化為本處超尊克勒穆爾齊將功德祕密之義全行闡揚又化為圖伯特之綽克圖薩斯嘉地方之班迪達恭噶扎勒燦屏去五百巴克什等之異端將異端巴克什名喇勒巴占者帶至圖伯特地方藉從前巴特瑪三博斡持誦之力令其死於途次因五項之知識已臻其極超出額訥特珂克地方衆約噶匝哩成全祕咒之流派於威鎮世界之圖伯特地方竭力於凱珠卜格勒克巴勒桑經文史咒之義及巴喇密特薩斯迪爾等知識之德以登彼岸遂化為純雪地方之迪克納噶喇嘛了悟三教二品等義又於圖伯特之溫薩巴廟內化為扎勒斡羅卜藏端珠卜與肇興一切知識不可倫比大有權變之汗相同供奉於精微祕咒金剛輪纛頂之上遂獲不壞金剛法身今化為博克達班禪蘇瑪迪達爾瑪都斡咱其神妙肫誠變化無窮之德藝有庸流之所不能盡述者嵗次乙未蒙古多倫土默特之多噶托音與海林烏格德巴圖爾塔布囊等行兵圖伯特地方於扎克博哩山收服藏巴汗之十萬大兵將回之際時博克達班禪額爾德尼正在扎什倫布廟內坐禪忽然心動以為綏定伊等獲福無量遂乘號諾爾布旺沁之馬倐至兩軍之間將下馬時其馬足蹤迹宛似印泥顯露於峰巒之上衆皆見之甚為駭異其前知三世之巴特瑪三博斡能知未來經有云五百年後濟碩特河界當生一有名之人俟至搆兵之際操持惻隱菩提心阿彌陀佛之化身喇嘛於和木錫木博迪薩都地方之扎克博哩山救十萬人之命以造無窮之福是以際此戰鬬之時而言博克達班禪額爾德尼之德藝者如彚大海於涓滴也於是大衆於博克達班禪額爾德尼前得聞金剛珠灌頂以及大啓精微金剛乘祕密灌頂隴教無不如願又嵗次丙辰前世達賴喇嘛藴丹扎木蘇年二十八嵗圓寂嵗次丁巳在薩斯嘉達克博地方化為丹巴古嚕巴諾延之子博克達班禪額爾德尼知之告以若於五嵗之前請至廟內則於夀命有礙至六嵗令布賚綳之弟子等隨從並㩦帶托音衣服以抵古嚕巴諾延家中衆見之驚異環視及入室內其小兒忽問曰巴克什班禪爾來何遲也博克達班禪即從荷包內取出冰糖呈獻曰孺子悶矣乎抱而坐之與博克達班禪講論經卷奧妙之語大衆無不駭異嵗次壬戌博克達班禪額爾德尼請至布賚綳穿戴黃衣黃帽落髮為僧入學肄業了無滯礙博克達班禪云今世德業必造其極矣遂命名為羅卜藏扎木蘇於是圖巴台總洪台吉為首率領由蒙古地方前來之喇嘛喀喇人衆向能識一切之達賴喇嘛羅卜藏扎木蘇多方懇求是嵗己丑年甫九嵗傳授消釋屯否之六臂瑪哈噶拉灌頂唪誦經文義理了無滯礙衆皆稱異謂實係觀世音菩薩化身云其所居之布賚綳廟內有前輩能識一切之達賴喇嘛藴丹扎木蘇之舍利子塔前開光博達班禪額爾德尼達賴喇嘛羅卜藏扎木蘇二喇嘛遂作吉祥之會令迪巴囊蘇髙聲唪誦遂上圖巴台吉以台總洪台吉之號並給與附近之固實喇嘛喀喇人衆名號稱薩爾推綽爾濟為多郭魯克散稱岱青綽爾濟為濟靈噶藏稱綽爾濟為達賚綽爾濟之號其多塔爾密噶特根敦達爾罕桑噶斯巴之子徹辰綽爾濟博克達班禪額爾德尼以卦驗示之云併此次計算爾與我為徒相會三次爾乃輔助蘇瑪迪吉爾迪教之髙徒自此爾之道將大為傳播矣因給與固實徹辰綽爾濟之號又謂大克埒穆爾齊阿斯多克斡齊爾托密灌頂大王固實之子都喇勒囊蘇曰爾乃曩昔鄂芝雅納地方噶喇卜多爾濟之髙徒名巴特瑪哈揚吉爾斡喇嘛曾於積雪地方咱克喇斡爾迪汗之時化為卓克囉壘托勒燦之克勒穆爾齊今生為薩木靈地方之根敦班珠爾旺楚克與我又相會矣至此已三次為我之弟子因給與噶喇卜班迪達壘扎勒燦之號稱為髙行弟子云又給與古嚕塔布囊以古揚塔布囊齊達罕三達克以蘇喀固實圖薩圖徹辰侍衛以徹辰歡津之號其餘小托音喇嘛喀喇人衆均挨次給號以徴瑞應焉正欲自彼回程噶喇卜班迪達壘扎勒燦通譯啓云前輩博克達斡齊爾達喇達賴喇嘛皆令昏暗部洲炳如日光大發慈悲乃培植我等根基之聖喇嘛也逮後能識一切之達賴喇嘛藴丹扎木蘇生於我汗族中能承經教以普洪慈今聖識一切之喇嘛其惠愛我等降臨東方蒙古之本地乎達賴喇嘛羅卜藏扎木蘇並無一言遂大哭泣迪巴囊蘇問云聖喇嘛緣何哭泣因提及前二聖而見惡乎抑謂由本處不能跋涉逺地乎抑謂我蒙古倚仗力強強行請回乎仍緘默無言大衆俱以瑞應已兆何必提及他事於是出走喇嘛喚回令繕寫書信給與贄儀於己丑年遣回乃起程回歸之際念及從前曾在賽音濟農汗前許以奉請繕寫銀字之丹珠爾經於丙寅年善為送至母氏哈屯乃齊集鄂爾多斯之諾延並延請邁達哩胡土克圖諾們汗持授銀字丹珠爾經正在散花開光之際土默特之達賚綽爾濟達爾罕綽爾濟二人為首率領胡巴喇克等以及博碩克圖汗之姪烏什啓伊勒登塔布囊哈噶圖台吉䇿凌洪岱青唐古岱公塔布囊塔拉圖丞相達爾扎洪台吉之溫雜特巴諾延唐噶哩克塔布囊唐古忒公錫格沁喀喇沁汗之綽爾濟衛徵垂扎木蘇唐古岱固實布延阿海之布木班諤勒哲圖侍衛等使者至焉是時次子林沁額葉齊岱青係庚子年生丁卯年二十八嵗即汗位謂係有根基人之子遂上薩囊洪徹辰洪台吉之號稱汗於是念君臣之道在諾們汗邁達哩胡土克圖之前同聽功德金剛灌頂仗彼福力大獲利益靈丹胡土克圖與汗為髫髮之交後大國廢墜之時薩囊徹辰洪台吉起兵外出正值察哈爾之官員等會盟而回因與珠拉圖巴圖爾侍衛邁都該達爾罕侍衛囊蘇巴圖爾伊勒都齊三人自幼為友遂糾合三百人嵗次甲戌年三卞一嵗由瀚海退回彼時向林沁徹辰濟農奏曰我等與察哈爾會合而回今欲與汗一同回去林沁徹辰濟農然之遂回即於是年戌月初三吉曰照依普木粗克凌廟內能識一切喇嘛之卦驗回至薩囊徹辰洪台吉國之達木地方一路安善由是林沁徹辰濟農前往原遊牧處所叩拜昭釋伽牟尼佛住宿於伊納之家從前察哈爾阿勒坦蘇巴爾罕之宰桑䇿楞將博多瑪勒主之白室令圖巴台總洪台吉特古勒德爾居住亦曾宿於伊納家中於是弟兄大聚人衆嵗次甲戌年三十五嵗匝噶喇斡爾迪徹辰濟農先即汗位其時鄂爾多斯土默特所餘之大小諾延收集所屬人衆乘亂脫出途中相會遂稱博達台楚古克爾號為額爾克諾延並給與首先糾衆擊讐之薩囊洪台吉號為額爾克徹辰洪台吉封為行兵則執纛前行圍場則居中行走之達爾罕其大小諾延等則論其功績酌量加恩有差措天下於太平一如前日焉再滿珠太祖汗初以智勇收服衆庶招降三江之珠爾齊特取恩克察罕珠爾齊特精太師之統其後午年行兵內地取大明汗之東省樂亭府郡天現明星昭示祥瑞鄂爾多斯之斡齊爾圖邁灌頂大王固實曰此太祖汗係有大福之人此星係大力汗之威力星由是觀之非常人也於是遐邇地方俱稱為大力巴圖魯太祖汗焉嗣統為太宗汗壬辰年降生嵗次丙寅年二十九嵗行兵至明蓋州其總兵官領兵出戰大隊齊發三太師諾延由後掩襲取城掠衆占據地方大有俘獲乃五鄂托克喀爾喀之蘇克宰桑諾延以我等取貢之城邑爾為何破取遂興兵來戰因而虜其集沙諾延復遣人向哈屯台吉屬人等諭曰爾等未破他人城垣之先欲先自亂其部落乎我實不肯作惡於爾蒙古等耳爾等其體道遵理認罪悔過誠心懇祈放爾諾延於是遣二台吉為首獻上牲畜億萬始將集沙諾延放還由是詔旨日漸逺播威稜大振沿邊之蒙古等無不畏懼其林丹庫圖克圖汗帶領右翼之三萬人衆遷移乃聨絡科爾沁之衆諾延等遂稱為徹辰汗其後林丹庫圖克圖汗運敗妻蘇台太后係珠爾齊特精太師之子德勒格爾太師之女同子額爾克洪果爾二人限於時命仍回原處汗族之諾延四人領兵往迎嵗次乙亥五月于鄂爾多斯遊牧之托賚地方被獲因取蒙古汗之統嵗次丙子年四十五嵗遂尊為阿固達鄂羅錫葉克齊德格都額爾德木圖鼐喇穆達果博克達徹辰汗嵗次丁丑年四十六嵗行兵明地圍錦州城一年勦殺洪蘇朗巴圖魯等十三總兵官所屬之兵遂破錦州全軍而回是時博克達班禪額爾德尼能識一切達賴喇嘛備書印餽儀差密納克之固實綽爾濟號為伊拉固克散胡土克圖者前往東方和爾摩斯達德格都額爾德穆圖博克達徹辰汗處致書并將從前卦驗呈閲云伏見三世輪回衆生而得此可珍可寶之身實如晨星罕見況統馭大衆尊而為汗者不更難乎是以值此戰鬭之時幸遇大有威力之汗以道法教育人衆乃要務耳更祈扶持佛教為我教中施主等語汗親身接見齊集大衆請入居住盛京城尊伊拉固克散胡土克圖為巴克什喇嘛受取愜意灌頂隴教講究精微經典以廣衍教法嵗次癸未伊拉固克散胡土克圖辭回本處贈與贐儀無算汗復贈與博克達喇嘛二人諸寶金銀各色幣帛降密旨云朕將往取大明汗都城俟世事理竣再迎博克達喇嘛二人相見以闡揚佛教遂降旨取大都城正欲行兵之際嵗次癸未夀享五十二嵗升遐諸王大臣遵奉汗旨往征明地以圍九門之城乃賊目李闖已害大明崇禎汗而克取大都城山海關之吳姓總兵歸附汗王於是滿漢會合逐出李闖嵗次甲申遂承明統而為君焉先是蒙古托衮特穆爾烏哈噶圖汗嵗次戊申漢人朱葛諾延年二十五嵗襲取大都城即汗位稱為大明朱洪武汗其烏哈噶圖汗之第三福晉係洪吉喇特托克托太師之女名格哷勒德哈屯懷孕七月洪武汗納之越三月是嵗戊申生一男朱洪武降旨曰從前我汗曾有大恩於我此乃伊子也其恩應報可為我子爾等勿以為非遂養為己子與漢福晉所生之子朱代共二子朱洪武在位三十年嵗次戊寅五十五嵗卒大小官員商議以為蒙古福晉之子雖為兄係他人之子長成不免與漢人為仇漢福晉之子雖為弟乃嫡子應奉以為汗朱代庚戌年生嵗次戊寅年二十九嵗即位在位四越月十八日即卒於是年無子其蒙古福晉所生子於己卯年三十二嵗即位於是即請噶爾瑪巴之特衮齊楞伊哷克森囉勒貝多爾濟薩斯嘉之大乘丹簪綽爾濟黃教之大慈札木禪綽爾濟等三人闡揚法教俾大國普衆安享太平在位二十二年嵗次庚子年五十嵗卒子宣德汗丙寅年生嵗次辛丑年三十六嵗即汗位以父所請之喇嘛扎木禪綽爾濟為護法共享太平在位十年嵗次庚戌年四十五嵗卒子正統汗戊戌年生嵗次甲寅年十七嵗即汗位戊午年二十嵗為衛喇特之額森太師執去弟景泰汗庚子年生嵗次己未年二十嵗即位嵗次癸亥衛喇特人衆送回正統汗弟景泰汗以兄身膺天命讓即汗位正統汗自謂為天所厭爾可仍舊不允其請景泰汗復在位三年共八年嵗次丙寅年四十七嵗卒嵗次丁卯正統汗年三十嵗復即汗位因復位遂稱為天順汗在位十七年嵗次癸未年四十六嵗卒子成化汗甲寅年生嵗次甲申年三十一嵗即汗位在位二十三年嵗次甲子五十六嵗卒子正德汗丙戌年生嵗次乙丑年四十嵗即位在位十六年嵗次庚辰年五十五嵗卒嘉靖汗戊午年生嵗次辛巳年二十四嵗即位在位四十五年嵗次己丑年六十八嵗卒子隆慶汗壬午年生嵗次丙寅即位在位七年嵗次壬申年五十一嵗卒子萬厯汗辛亥年生嵗次癸酉年二十三嵗即汗位在位四十八年汗時一如永樂皇帝令大國人衆共享太平嵗次庚申年七十七嵗卒子泰昌汗辛巳年生辛酉年即位年四十一嵗在位十一月即於是年卒子天啓汗甲辰年生嵗次壬戌年十九嵗即汗位在位七年嵗次戊辰年二十五嵗卒弟崇禎汗己亥年生嵗次己巳年三十一嵗即位在位十六年嵗次甲申滿洲順治皇帝取其統緒順治皇帝戊寅年降生嵗次甲申年七嵗坐大明汗之金床天下咸稱為順治皇帝總統南方八十萬漢人西方阿木多喀木二十六部落圖伯特北方四萬衛喇特東方三萬髙麗中原四省滿珠六萬蒙古天下一統頒賜恩賞隨其大小均給與部落之汗諾延大臣王貝勒貝子公等爵號創建大業鴻緒乂安嵗次辛卯年十四嵗以先帝曾降旨取大都城後理竣世事即延請博克達喇嘛二人興起法教於是遣使延請二博克達喇嘛博克達班禪額爾德尼以年老未至惟能識一切達賴喇嘛羅卜藏扎木蘇前來嵗次壬辰年十五嵗至於大都城外修建黃墻廟宇內建三世佛像達賴喇嘛及隨從弟子所居精舍以及庫藏俱裝飾威嚴大興佛教以隆重佛嗣博克達能識一切達賴喇嘛遂以衆生依庇之博克達班禪額爾德尼稱為昻依齊喇嘛輔助佛教廣興聖道俾四境無纍八方無擾大國太平如日中天乃大皇帝之恩也賴此有慶邊陲寧謐蒼生樂利致天下太平於無既矣自昔世界生靈以及額訥特珂克稱汗以來以至衆生戰鬬之時乃聖武汗篤生致天下於久安長治而諸福慧菩薩顯著引導生靈以統攝天下佛教常新列聖御極乂安率土筆所不能盡述謹就所識集而成書緣庫圖克台徹辰洪台吉之裔小徹辰薩囊台吉頗有逺識願知一切乃將汗等源流約略敘述並將珍異奇葩之卷講解精妙意旨紅册沙爾巴胡土克圖編纂發明賢哲心意之蓬花漢史雜噶拉斡爾迪汗所編之經卷源委古昔蒙古汗等源流大黃册等七史合訂校自乙丑九宫值年八宫翼火蛇當值之二月十一日角木蛟鬼金羊當值之晨起至六月初一日角木蛟鬼金羊當值之晨告成如有差謬之處幸祈原諒賢哲見之幸為改正若云有合於古則以為上天如意之寶而永為學者開心上蓮花云耳欽定蒙古源流卷八
