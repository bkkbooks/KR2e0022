body:
  text: 額納特珂克土伯特䝉古汗等源流其扎賚爾呼圖克實古錫之女蘇密爾福晉生格哷博羅特台吉格哷森扎台吉二人衛喇特巴圖特巴噶爾觀鄂托克之阿拉克丞相之子孟克類阿古勒呼之女古實福晉生鄂卜錫衮青台吉格哷圖台吉二人共歴十一汗俱係永謝布之伊斯滿太師專擅亊權郭爾羅斯之托郭齊實古錫聞此倡議遣兵往掠遂殺伊斯滿太師令錫吉爾福晉乗馬乃哭悼伊斯滿太師逡巡不前托郭齊實古錫怒甚謂之曰得毋以結髪之賽音濟農為下賤乎得毋以親生之子達延汗為庸惡乎得毋以所屬之察哈爾土黙特為陋劣乎得毋以肆行結讐之伊斯滿太師為嘉美乎言訖拔刀相向始懼而上馬衆皆嗤笑托郭齊實古錫遂娶伊斯滿太師之妻郭羅泰為妻以錫吉爾福晉與汗完聚旋據右翼三萬人處遣鄂爾多斯哈爾噶坦之拜音珠固爾達爾罕永謝布之布哩雅特之珠爾噶岱墨爾根圖們毛明安之多郭蘭阿固勒呼等三大臣帶領三十人前來請曰有洪福君汗業已即位旦夕擊滅仇讐幸及見上天符應滿都海徹辰福晉祝辭衍慶誕育七博羅特君汗所有供奉八白室中之瑩瑩髙燭時然馥馥美香雖出六大處屬衆之貢賦仍須永久承治之濟農請於君汗之諸子中簡畀汗與福晉大衆僉許之以烏魯斯博羅特授為右翼三萬人之濟農令郭爾斯之巴巴該烏爾魯克隨徃稱為阿巴海至汗之陵墓欲於次日叩謝立為濟農之恩時永謝布之伊巴哩台吉與鄂爾多斯之滿都賚阿都勒呼二人密商以為我等之上何用管主我等行事自作主宰可也我等其殺此阿巴海遂密教錫巴郭沁之名博勒卓瑪爾者俟至翌日我等齊集叩謁時爾以阿巴海所乗者係爾等之馬與之争鬬我等當以言嚇之次日三人依約值阿巴海乗馬前來博勒卓瑪爾進前以所乗之馬係伊之馬遂牽其繮阿巴海雖係從容分辨不允阿巴海發怒抽所拔順刀以砍博勒卓瑪爾之頭伊巴哩滿都賚二人大怒云伊今初到即如此舉動日後殆欲盡除我等乎遂欲殺阿巴海舉事之際鄂爾多斯哈爾噶坦之拜音珠固爾達爾罕諫云此乃公同商議以衆庶無主難以行事因懇請君汗遣一子前來今若作惡於阿巴海不畏上天鑒察耶伊巴哩滿都賚二人不從首先著甲而至是時洪吉喇特之巴圖爾庫哷遜以其所乗紅沙馬給阿巴海云衆人之情形殊異阿巴海其避出迨不能拒遂藏匿於白室之内當其交戰時鄂爾多斯之名圖黙特巴雅里衮者射穿伊巴哩之腹阿巴海正在令人擒縳之際脊背被射而殞其後巴爾斯博羅特賽音阿拉克養育於伊姊額錫格公主噶海之手曾住於䝉郭勒津察庫特之郭錫塔布囊之家巴爾斯博羅特因伊兄授為濟農欲叩謝上恩郭錫塔布囊以此時難以遽信令其乗上好黄馬往依鄂爾多斯之特穆爾處由此相惡而亂生矣賽音阿拉克乗上好黄馬與特穆爾一同避去而額錫格公主郭錫塔布囊二人商議此子我等既不能䕶養可送與伊父即咨詢䕶送之親信人當令鄂爾多斯庫伯古特之特穆爾烏格新之巴克蘇固里浩爾濟達拉特之吹圖爾根烏喇特之推瑪克布喀斯之恩庫爾星和爾之阿哈岱䝉郭勒津之畢里克圖等七人往送又令一婦人隨賽音阿拉克之博坦福晉併將三歲之衮必里克帶往僅留阿勒坦䝉郭勒津之錫尼凱烏爾魯克額伯格衣阿哈二人自是往尋汗父途中口糧斷絶採野葱且食且行特穆爾復殺一野騾以接續口糧遂得尋至達延汗乃特賜特穆爾太師名號其餘七人均施恩復其家焉旋帶兵以征右翼三萬人甫入翁觀山谷急欲出谷駐營乃達拉特之巴圖爾訥古哷凱趕牛吹海螺行走左翼三萬人疑牛蹄踐踏之聲為甲胄之聲以為兵至紛亂逃避達延汗之額伯爾黄馬涉河半渡倒落汗之盔纓䧟入泥淖極深不能起立因呼曰號巴蘇特托觀之糖紅兒馬䧟住扎固特之察罕徹格濟二人回身救出乗馬而行因黒夜不辨谷口越矮山行去衆人之馬鞍俱各脱落遂名此山為英噶爾察衮嶺云適有巴圖魯訥古哷凱作歌曰靜坐之人無異一夢其隨來之左翼土黙特是歟非歟惟帝天鑑之以理教誨者圖爾根哈屯也匆遽擾攘者大金屋也達延汗既旋師駐蹕後伊巴哩滿都賚二人為首派三萬兵前往而浩錫塔塔布囊於隊内藏匿二人遣往致信於達延汗云分散之後追趕克錫克騰克木齊古特二鄂托克直至噶海額勒蘇地方而回乃浩錫所遣之二人以行兵既回之後我之巴圖魯訥古哷凱曾如此作歌之語奏聞於汗汗大怒向天叩拜而祝曰忽起惡念前來征伐者因伊巴哩滿都賚無故加害烏魯斯博羅特阿巴海之故也而巴圖魯訥古哷凱肆言􅏺誚者何也祈帝神質此以鑑焉向天告祭禱訖遂令阿巴噶科爾沁等帶領左翼三萬人前往征之而右翼三萬人聞汗行軍前來迎㑹於達蘭特哩衮地方汗降旨云鄂爾多斯者乃為汗守禦八白室之人烏梁海者乃為汗守金糓倉庫之人均屬大有福者其令科爾沁阿巴海阿巴噶岱禦之十二土黙特與十二鄂托克喀爾喀同為輔助俱於大永謝布處與八鄂托克察哈爾相㑹諭訖科爾沁之鄂爾多固海諾延之子布喇海巴圖爾台吉鄂哩延之巴圖魯必扎該扎固特之賽音徹格濟五鄂托克喀爾喀之巴噶遜塔布囊克錫克騰之巴圖魯烏魯木五人引入使喀爾喀擊土黙特察哈爾擊永謝布于是鄂爾多斯之哈爾坦拜音珠固爾達爾罕奎圖特之達爾瑪達爾罕哈里郭沁之烏特哈齊昆都楞土黙特杭錦之阿勒楚賚阿固勒呼洪吉喇特巴圖魯庫哩遜永謝布布喇哈特之索克唐諤布喇杭諤喀喇沁之莽郭勒岱和錫郭齊七人呼名而來㑹合引入由烏梁海中間縱横突戰巴爾斯博羅特賽音阿拉克帶領巴圖魯四十人前來引入由土黙特中間鄂爾多斯背後來援襲戰之際鄂爾多斯之孟庫庫托克齊知係賽音阿拉克乃云賴君汗威福汗之後裔前來遂舉纛投降由是賽音阿拉克建立大纛立於其下而誤認纛形追趕烏梁海前來之鄂爾多斯之兵大半死焉因此右翼内或有投降者其餘被達延汗驅至青海將三萬人盡行收服於阿津柴達木之上將鄂爾多斯之滿都賚阿固勒呼殺死遂名為阿固勒呼柴達木云永謝布之伊巴哩太師隻身迷路入於白帽之哈密城被其人所殺達延汗遂收服右翼平定六萬兵民大衆於君汗之八白室前稱汗號於十一子内令博迪承襲汗位因巴爾斯博羅特帶右翼之三萬人投來即令為管右翼三萬人之濟農併授賽音阿拉克為管三萬人之濟農其資送博勒呼濟農之四人幇助滿都海徹辰福晉之四人以及効力於賽音阿拉克之七人䕶持達延汗被擄時之唐拉噶爾之特穆爾哈逹克戕害阿巴海時諫勸之哈爾噶坦拜音珠固爾達爾罕給與阿巴海上好沙馬乗騎之洪吉喇特之巴圖魯庫哩遜給與阿巴海順刀䕶衛阿巴海之格倫諾延鄂爾多郭特太師射穿伊巴哩腹之巴雅木里衮達爾罕領頭目七十人入隊左翼三萬人内五人以下凡有出力一切人等俱賞給岱達爾罕名號勅諭金印其扎嚕特之巴噶遜達爾罕塔布囊以滿都海徹辰福晉所生之圖魯勒圖公主降焉越時烏梁海格根丞相托噶台哈喇呼拉特為首以烏梁海萬人謀叛達延汗率察哈爾喀爾喀兩部落之兵往征之並致信於巴爾斯博羅特濟農之子帶右翼三萬人前來攻入遂與烏梁海萬人交戰左翼三萬人内則有喀爾喀扎嚕特之巴噶遜達爾罕塔布囊察哈爾扎固特賽音徹格濟之子訥克貝昆都楞哈什哈二人右翼三萬人内則有鄂爾多斯哈爾噶坦之拜音珠固爾達爾罕土黙特杭錦之阿勒楚賚阿固勒呼二人此四人與頭隊之兵拒戰破烏梁海大隊收其餘衆併入五萬人内稱為六萬人此達延汗將六萬人全行收服致䝉古國於太平之原委也在位七十四年歲次癸卯年八十歲而歿其子圖嚕博羅特烏魯斯博羅特二人係壬寅年生圖嚕勒圖公主巴爾斯博羅特二人係甲辰年生扎爾蘇博羅特斡齊爾博羅特二人係庚戌年生扎拉爾福晉所出之格哷博羅特係壬寅年生格哷圖台吉係辛亥年生圖嚕博羅特於汗在時歲次癸未年四十二歲歿子博迪台吉生於甲子年至甲辰年四十一歲即位科爾沁之巴圖爾摩羅齊建議右翼原係强斡之儔或征掠以離散之或酌量入於左翼均分之博迪阿拉克汗然其言正欲往征右翼之際察噶青安桑太后降旨曰爾等議以均分此三萬人乎從前科爾沁之蘇爾塔該王既破達蘭特哩衮之大隊後奏曰此右翼三萬人若仍留一處必貽患於後嗣若將兩部落人等兼攝於察哈爾巴雅爾而令大永謝布之二十萬科爾沁與我和同將十二土黙特合併於十二鄂托克喀爾喀庶可久安我烈祖曾降旨詰責曰戕害我子之讐人業已尋得伊巴哩滿都賚二人之惡業已敗露若將此四十萬䝉古所餘之六萬人盡滅之豈得為人主之功乎今爾自以為勝於我烈祖乎乃違其旨而欲吞此右翼三萬衆耶一則我烈祖所定永固昇平之大統豈得毁壊二則曾聞賽音阿拉克之長子衮必里克墨爾根濟農之子布揚郭賚都噶爾岱青人稱為見敵則不退縮擊之則披堅死戰勇於戰鬬之大巴圖魯其伊勒特阿勒坦之子僧格都古稜特穆爾則稱為能著全副盔甲跳越台拉克之駝隻墨爾根濟農之子諾木塔爾尼郭幹台吉之子庫圖克台沙津台吉則稱為能知既往未來之黙爾根布揚郭賚都噶爾岱青之子伯爾格岱綳台吉則張弓能兩臂相向遂稱為鄂勒博克圖鄂庫克能將馳狐之尾按節射斷伊弟布爾賽哈坦巴圖魯能穿射三鍁今若相殘能之固善如不能則人已皆致騷動矣因降旨諫阻子博迪阿拉克汗遵母后之言遂止不行以致大國安享太平在位四年歲次丁未年四十四歲歿生子達賚遜庫登台吉庫格珠特台吉翁衮都噶爾三人長子達賚遜庫登台吉甲辰年生歲次壬申年二十九歲於白室前稱汗號與右翼三萬人和睦相㑹而旋阿拉克第二子阿勒坦來迎向汗求賜號云今統治已平原有䕶衛汗治索多汗小汗之號祈即將此號賜我我情愿䕶衛大統汗然之遂與以索多汗之號由是庫登汗之號遍處稱揚平治政統俾大䝉古國安享太平因為時命所奪歲次辛巳年三十八歲歿生子圖們台吉達賚巴噶達爾罕岱青台吉三人圖們台吉乙亥年生歲次癸夘年二十九歲即位歲次壬子年三十八歲往見盤結腰刀之噶爾瑪喇嘛遂受禪教聚集六萬人𫝊示大政令左翼三萬人内察哈爾之阿穆岱鴻台吉喀爾喀之衛徵索博該右翼三萬人内鄂爾多斯之庫圖克台徹辰鴻台吉阿蘇特之諾木達喇古拉齊諾延土黙特之楚嚕克鴻台吉執政理事遂稱為扎薩克圖汗共致大國治統大平由珠爾齊特額里古特達奇鄂爾三部落取其供賦俾大衆安戢在位三十五年歲次壬辰年五十四歲歿生子布延台吉等兄弟共十一汗長布延台吉己夘年生歲次丁巳年三十九歲即位大衆稱為徹辰汗以政治佛教致大國於太平歲次丁夘年四十九歲歿生子莽和克台吉喇卜噶爾台吉茂竒塔特台吉弟兄三人長子莽和克台吉於父在時即歿生子陵丹巴圖魯台吉桑噶爾濟鄂特罕台吉二人長子陵丹巴圖爾台吉壬辰年生歲次甲辰年十三歲即位大衆稱為庫圖克圖汗從邁達哩諾們汗卓尼綽爾濟等承受秘宻精深之灌頂扶持經教歲次丁巳年二十六歲又遇薩斯嘉班辰沙喇巴胡土克土復承受秘宻精深之灌頂創修昭釋迦牟尼佛廟以及各項廟宇於一夏季䟎趕建造所有牌位神座俱已造成照前整齊經教因至五百年末運遂分為六大國而稱君焉達延汗之子孫及汗之族屬民衆因背道違理肆意而行故不能身享太平譬之諺云君一怒而失國象一怒而破城也汗一味恚怒不悦欲收六大國之統治在位三十一年歲次甲戌年四十三歲以夀終此達延汗之長子圖嚕博羅特厯代相𫝊之政統也次子烏魯斯博羅特無子令巴爾斯博羅特賽音阿拉克統率右翼三萬人之衆阿爾薩博羅特墨爾根鴻台吉統率七萬人之衆阿勒珠博羅特統率内五鄂托克喀爾喀格哷森扎統率外七鄂托克喀爾喀斡齊爾博羅特統率察哈爾之八鄂托克克什克騰格哷博羅特統率察哈爾之敖罕奈曼阿爾博羅特統率察哈爾之蒿齊特烏巴繖察統率阿蘇特永謝布二處其格哷圖台吉無子巴爾斯博羅特之子衮必里克墨爾根濟農阿勒坦汗拉布克台吉巴雅斯哈勒昆都楞汗巴延達喇納琳台吉博迪達喇鄂特罕台吉塔喇海台吉等共兄弟七人長子衮必里克墨爾根濟農丙寅年生佔據鄂爾多斯萬人而居阿勒坦汗丁夘年生佔據十二土黙特而居拉布克台吉丁夘年生佔據土黙特之烏古新而居巴雅斯哈勒庚午年生佔據永謝布之七鄂托克喀喇沁而居巴延達喇壬申年生佔據察哈爾之察罕塔塔爾而居博迪達喇甲戌年生幼時曾戱作歌有欲將阿濟實喇二人剿滅佔據阿蘇特永謝布而居之語困烏巴繖察青台吉之子實喇兄弟相殘責阿濟以殺弟之罪而實喇無嗣被害衆議以為歌騐遂將阿蘇特永謝布二處令博迪達喇佔據而居塔喇海幼亡初賽音阿拉克之父年二十九歲於壬申年為濟農在位二十年歲次辛夘年四十八歲卒其後衮必里克墨爾根濟農歲次壬辰年二十七歲為濟農與弟阿勒坦汗二人為首率右翼三萬人行兵中國至音達噶山谷口明兵迎戰墨爾根濟農之子布揚古賚都喇勒岱青阿勒坦汗之子僧格都古楞特穆爾二人衝入明兵隊内來往􅊳擊三次大破音達噶大隊撤兵而回其衮必里克墨爾根濟農之大福晉土黙特杭錦愛蘭塞格爾之女名唐素克者所生諾延達喇濟農拜桑固爾台吉二人喀爾喀扎賚爾額森沙津之女名額實格之鄂克福晉所生衛達爾瑪諾木歡諾延一人土黙特䝉郭勒津察古特之和實塔布囊之阿勒坦綽賽音福晉所生諾木塔爾尼郭斡台吉布揚古賚都喇勒岱青班扎喇衛徵諾延巴特瑪繖巴斡徹辰巴圖爾四人永謝布之伊巴哩太師之女阿穆爾津福晉所生阿穆爾達喇達爾罕諾延鄂克拉罕伊勒登諾延二人共謂之九汗墨爾根濟農為濟農十九年歲次庚戍年四十五歲卒子諾延達喇壬午年生歲次庚申年三十九歲為濟農于是兄弟九汗分析另居諾延達喇濟農佔據四營拜桑固爾癸未年生佔據右翼扣克特錫包沁烏喇特圖伯特衛達爾瑪癸未年生佔據右翼達喇特杭錦墨爾格特巴罕諾木塔爾尼甲申年生佔據右翼巴蘓特衛新布揚古賚丙午年佔據右翼伯特金哈里郭沁班扎喇戊子年生佔據左翼浩齊特克里野斯巴特瑪繖巴斡庚寅年生佔據左翼察哈特明阿特科爾沁之三十四處阿穆爾達喇辛夘年生佔據右翼四鄂托克衛郭爾沁鄂克拉罕癸巳年生佔據右翼三鄂托克阿瑪該而居自是諾延達喇原配福晉生子布延巴圖爾鴻台吉諾木圖都古稜諾延鄂木布達賚諾延必巴錫鄂特罕諾延續娶福晉生子莽固斯楚克庫爾兄弟共五人拜桑固爾生子愛達必斯達顔延諾延諤巴卓哩克圖諾延塔噶濟宰桑諾延昆都楞諾延兄弟四人衛達爾瑪生子達竒和頋齊鴻台吉海努克巴圖爾諾延阿恰昆都楞岱青楚嚕克青巴圖爾托濟徹辰控庫爾庫色勒衛徵卓哩克圖兄弟六人諾木塔爾尼郭斡台吉之尼衮特古斯徹辰福晉生子庫圖克台徹辰鴻台吉布延達喇古拉齊巴圖爾賽音達喇青巴圖爾徳勒格爾福晉生子阿穆達爾墨爾根台吉共兄弟四人布揚古賚之托遜珠拉福晉生子伯勒格岱綳諾延布爾賽徹辰岱青兄弟二人巴扎爾之哈屯珠拉生子多爾濟達爾罕岱青鍾都賚衛徵諾延恩克和碩齊兄弟三人巴特瑪三巴斡之阿勒坦珠拉福晉無子衆議以為若將伊之屬衆各處分佔令其父母離散實屬難行因令巴扎爾之子多爾濟佔據四鄂托克於是兄弟三人共相和睦將四鄂托克令達爾罕岱青佔據而居阿穆達爾生子圖墨徳達爾罕岱青明安之額葉齊諾延必巴錫台吉兄弟三人鄂克拉罕生子克齊吉伊勒登諾延貝博哩諾延庫圖克泰台吉兄弟三人阿勒坦汗年四十七歲歲次壬子行兵四衛喇特于控奎扎卜罕地方殺奈曼明安輝特之諾延瑪尼明阿圖將表兄并甥婦以及二子並所屬人衆全行收服佔據四衛喇特至十九年取其城行兵中國侵凌騷擾明人大懼遣使阿勒坦汗給與孫王之號并給金印講和阿勒坦汗六十六歲歲次辛未與大明隆慶共攝大統大頒庫藏不計其數六十八歲歲次癸酉行兵薩哈連圖伯特地方將上下沙喇衛郭爾二部落阿木多喀木之阿哩薩噶爾齊斯竒巴喀嚕卜倫布木薩爾唐薩哩克卜之三諾延以及所屬人衆盡行收服阿哩克喇嘛固密蘇噶巴克實二人率所屬一同歸附於是阿哩克喇嘛為汗解脱三惡縁及來世罪孽昇至色究竟天唪誦大有利益區别取舍等經汗遂耑志經典始念六字心咒其庫圖克圖徹辰洪台吉庚子年生歲次壬戌年二十三歲行兵四衛喇特于額爾齊斯河征勦土爾扈特擊殺喀喇博郭羅竪立黒纛於竈君之前將錫木必斯土爾扈特存留一半安置其地遂撤兵歲次丙寅年二十七歲行兵圖伯特次於錫里木濟之三河交㑹地方大布爾薩喇嘛禪師喇嘛達爾罕喇嘛為首遣使致信於烏松都爾三津河勒坦三津云爾等若歸附於我我等共此經教不然我即加兵於爾彼甚畏懼互相商議已逾三日二弟諫言何須久待立即進兵兄徹辰鴻台吉云詰朝日出時有喇嘛三人前來其正中坐之喇嘛必向我善言之可姑待之耳至次日清晨果有喇嘛三人來謁正中坐者名達爾罕喇嘛向徹辰諾延講論徹辰諾延問云爾族中有稱斡齊爾托密之墨爾根桑噶斯巴者否答以並無此人因諭之曰爾等及今回去即率衆投誠不加譴於爾等矣遣之回次日斡齊爾托宻桑噶斯巴正在牧馬而行見一騎虎鬚眉間放出火熖之人趕至又作為欲行追逐入屋之狀而去因將此縁由告諸衆人伊叔達爾罕喇嘛云昨觀徹辰諾延非常人也是葢其汗變化以示異耳何可避匿不如同我等前去遂領至相見果即前騎虎追逐之諾延也甫一相見即如素識之人呼桑噶斯巴而問曰爾昨日縁何避我爾若非化白鳳而去我彼時即擒爾矣伊叔達爾罕喇嘛聞是語顧其姪曰我前未與爾言之乎於是收服三部落圖伯特帶領巴克實喇嘛阿斯多克賽音班第阿斯多克斡齊爾托密桑噶斯巴等三人至䝉古地方以烏堪珠沁丹與斡齊爾托密為妻並給以圭温歡沁之號尊為各官之首領焉其二弟布延達喇古拉齊巴圖爾壬寅年生年三十一歲賽音達喇青巴圖爾乙巳年生年二十八歲歲次壬申行兵托克摩克於實喇莫楞地方擊敗阿克薩爾汗掠取屬衆並擄獲秋格依福晉青巴圖爾收為已妻撤兵而回至尼楚衮哈薩拉克地方阿克薩爾汗領兵十萬追至交戰青巴圖爾年二十八歲布爾賽岱青丙午年生年二十七歲徹辰鴻台吉之長子鄂勒哲伊勒都齊丙辰年生方十七歲三人首先進攻由西北方鏖戰固拉齊巴圖爾由正中冲入所乗之馬為阿嚕庫克射斃易馬而戰馬膝又中箭而倒為殿後兵所擊而青巴圖爾來援其兄同殞於陣徹辰岱青率布哈斯之圖嚕貝巴圖爾哈爾噶坦之多塔達噶台吉共七人一同步戰而出鄂勒哲伊勒都齊所乗之馬被射仍擐甲步行阿巴該吉魯根見之給以所牽之馬令其乗騎遂由左超上騎之其馬復被箭仍步行遇哈爾噶坦之賽音海努克侍衛下馬即以其馬與之乗因欲令其叠騎駐馬讓之海努克云我有子名巴扎爾其愛䕶之無庸顧我矣遂乗其馬格鬬而出迨後其兄徹辰鴻台吉三十四歲歲次癸酉精選賽音哈屯之四額哷斯塔木克克里之五和碩齊並兵七百名往征直至哈蘇羅克地方托克摩克之阿克薩爾汗帶兵十萬迎戰於額錫勒泰寳徹辰洪台吉傅諭於衆曰敵隊在前不拘何人不可先我攻進我親領之以入諭畢乗博囉呼察之賽音阿固拉薩爾拜紅馬身被描金象皮紅穆納甲胄率衆攻入敵衆于彼隊内見為首之人鬚眉間放出火熖復見兩隊乗黒馬之兵馬足發火迅速而至遂敗之殱戮過半自此青巴圖魯之甲無不識者遂生擒阿克薩爾之子三素勒坦分别懲釋以復二弟之讐振旅而回歲次甲戌布延巴圖魯聞洪台吉弟兄加兵於四衛喇特遂將輜重留於巴里坤以次行兵於四衛喇特令巴圖魯鴻台吉哈爾該在前隊而以額色勒貝侍衛領之欲將八千輝特土黙特盡行招服徹辰鴻台吉於擠拉瑪汗山後以喀木蘇都哩圖二人為首並留巴圖魯等率其子鄂勒哲伊勒都齊追趕三月之久糧絶有食巴爾吉勒塔石塊者圖巴汗之山陽以綽羅斯之必齊哷錫格沁為首擄掠四鄂托克於是挨次撤回是時徹辰鴻台吉在博隴吉爾地方伯竒徹辰濟雅噶齊圖伯特哈實噶濟雅噶齊二使人有額色勒貝侍衛眼似兎鶻非守分之人恐䜛譖八千輝特土黙特人衆以分兵勢之語巴圖魯鴻台吉不然其言令其等侯於外乃額色勒貝侍衛恃徹辰鴻台吉素日之寵任意於釡内取肋八條與此二人食之遣二使人去後徹辰鴻台吉怒甚乃擺列整馬肋四塊並琵琶骨斥責額色勒貝侍衛云爾其盡食之諺云染指於乳汁投桿於牧羣爾乃以手向我釡内取肉先與人嘗之耶遂以指夾取令其食之於是四衛喇特人衆共以手指取肉食人之言互相非議焉額色勒貝侍衛擲肉出於外曰馬肋八條我並未食也君父其請食索岱明阿圖之肋八條乎言訖以足頓地而去是夜帶兵乗馬而至於克爾齊遜河弑巴圖魯鴻台吉額色勒貝侍衛乃叛去諾延達喇濟農在濟農位二十三年歲次甲戌年五十三歲歿布延巴圖魯鴻台吉生子博碩克圖濟農諤勒哲炳鴻台吉班第墨爾根卓哩克圖弟兄三人諾木圖都古稜生子滿珠錫哩鄂木博達賚諾延生子必巴賽鄂特罕巴圖魯庫徳徳色凌二人莽固斯楚格庫爾生子布納班鴻巴圖魯布達錫哩伊勒都齊本巴台吉阿巴海鄂特罕卓哩克圖本巴岱岱青布延泰台吉弟兄六人阿塔必斯達延諾延生子阿齊圖達延諾延額成吉炳圖諾延瑪齊克額特罕諾延弟兄三人諤巴卓哩克圖生子阿南達和碩齊諾延綽克圖台吉阿穆桑台吉多爾濟岱青圖巴扎勒丹弟兄五人塔噶齊宰桑生子班崇鴻台吉昆都楞生子貝瑪圖達竒和碩齊生子竒塔特鴻台吉喇嘛幹齊爾格隆圖們達哩徹辰和碩齊弟兄三人海努克巴圖魯生子奇塔特岱巴圖魯古哲格齊固拉齊圖邁墨爾根諾延必巴賽諾延庫森徳諾延弟兄五人額恰昆都楞楚庫克爾生子衛瑪遜宰桑和碩齊桑賽楚庫克爾諾延托濟徹辰楚庫克爾生子諤努昆鴻台吉伊實欽台吉薩班達喇台吉額斯克勒台吉弟兄四人楚嚕克青巴圖魯生子哈坦巴圖魯青巴圖魯弟兄二人庫色勒衛徵生子多爾濟衛徵桑鴻台吉弟兄二人瑚圖克齊齊克鴻台吉生子諤勒哲伊勒都齊達爾罕巴圖魯錫塔㤗徹辰楚庫克爾昆徳徳賓圖岱青布延㤗徹辰卓哩克圖本巴岱綽克圖台吉本巴錫哩徹辰巴圖魯達納錫哩哈坦巴圖魯弟兄七人布延達喇郭拉齊巴圖魯生子莽固斯額爾徳尼郭拉齊賽音達喇青巴圖魯無子阿穆岱墨爾根台吉生子圖壘青固拉齊伯勒格岱綳生子阿津岱綳諾延布爾賽岱青生子薩㤗固實鴻台吉薩濟巴圖魯鴻台吉衛喇特墨爾根諾延額徳伊勒登和碩齊察庫墨爾根卓哩克圖色凌哈坦巴圖魯巴圖特台吉弟兄七人多爾濟達爾罕宰桑生子明愛青岱青鍾都類衛徵庫伯衮達什衛徵鴻台吉達賚宰桑錫喇卜綽克圖翁圭楚庫克爾喇錫顔台吉阿巴岱弟兄六人恩克和碩齊生子桑濟和碩齊錫達達楚庫克爾本巴達爾台吉弟兄三人圖邁達爾罕岱青生子本拜岱青諾延本巴錫哩台吉察哩必台吉阿竒依台吉薩欽台吉額埒格台吉本巴台吉圖壘台吉弟兄八人明愛之音扎生子布延㤗音扎諾延恩克錫哩台吉䝉克錫哩台吉弟兄三人格齊吉伊勒登生子貝瑪圖諾延宰桑諾延宰桑固爾固拉齊衮布台吉弟兄四人庫圖克台生子巴巴岱青布多爾徹辰卓哩克圖博羅摩爾台吉弟兄三人貝巴哩生子博迪錫哩鴻台吉額黙格勒徳岱青拉拜台吉恩克台吉恩克錫哩台吉弟兄五人此九汗之子孫次序也其布延巴圖魯台吉被害之後於己亥年撤兵庫圖克台鴻台吉云父歿於家子殘於敵今八白室内不可無奉祀之人博碩克圖濟農己丑年生歲次辛丑年十三歲至是立為濟農至三十七歲往見其叔阿勒坦汗諫云從前失陷城池與中國人結讐以致出亡失統今汗夀已髙漸至於老事之有益於今生以及來世者惟在經教先賢曾言之今聞西方純雪地方有大慈大悲觀世音菩薩出現祈遣使請來照從前神祖呼必賚徹辰汗與胡土克圖帕克巴喇嘛設立道教豈非盛事乎阿勒坦汗深為嘉許遂與右翼三萬人和好即於丙子年令阿勒坦汗之阿都斯達爾罕阿竒依達爾罕徹辰鴻台吉之鴻郭岱達顔巴克實等充為使人往請聖識一切之索納木扎木蘇胡土克圖使人未到之先其聖識喇嘛靜坐忽云䝉古之阿勒坦汗夀數既已綿長誠心抑何篤實近侍徒衆聞而議之曰是何言也繼而䝉古之使人至彼呈獻書信告以來請縁由聖識一切喇嘛微笑云我等前世已結善縁我今必往令使人先回禀告汗與施主付以書信促之起程使人等將至三萬人共議在青海之察卜齊雅勒地方修造廟宇歲次丁丑右翼之三萬人乗馬往迎直至察卜齊雅勒地方初次往迎者乃永謝布之巴爾郭岱青鄂爾多斯之哈坦巴圖魯土黙特之瑪哈沁巴克什等八百人前往呈獻幣帛諸寳駝馬等物見後欲指引之至烏蘭莫稜以手指其水水遂逆流由是若輩肫誠無毁之敬心益加篤矣二次往迎者乃鄂爾多斯之青巴圖魯土黙特之卓哩克圖諾延率千人前往叩獻贄儀五千人乃於原野湧出一泉大衆俱發至誠之心住宿烏蘭莫稜之夜領受聖馬明王之旨獻供於大力班扎瑪哈噶拉授以守教之事遣令往收䝉古地方之天龍由是至衮額爾吉地方夤夜復將䝉古地方之龍鬼魑魅駝馬牛羊貓鵰狼首各項妖魔盡行拘收鎮服焉欽定䝉古源流卷六
