body:
  text: 額訥特珂克土伯特䝉古汗等源流古土伯特地方尼雅持贊博汗之七世孫色爾持贊博汗為其臣隆納木簒奪汗位其子博囉咱罝持布爾特齊諾等弟兄三人俱各出亡季子布爾特齊諾出之恭博地方即娶恭博地方之女郭斡瑪喇勒為妻往渡騰吉斯海東行至拜噶勒江所屬布爾干噶勒圖納山下遇必塔地方人衆詢其故遂援引古額訥特珂克人衆所推尊之土伯特地方之尼雅持贊博汗以語之必塔地方人衆議云此子有根基我等無主應立伊為君遂尊為君長諸惟遵㫖行事生子必塔斯干必塔察干二人必塔察干生特墨徹克特墨徹克生和哩察爾墨爾根和哩察爾墨爾根生阿固濟木博郭囉勒阿固濟木博郭囉勒生薩里噶勒濟固薩里噶勒濟固生尼格尼敦尼格尼敦生薩木蘇齊薩木蘇齊生哈里哈爾楚哈里哈爾楚生博爾濟吉台墨爾根墨爾根之䝉郭勒津郭斡哈屯生都喇勒津巴延都喇勒津巴延之博囉克沁郭斡哈屯生多斡索和爾多博墨爾根弟兄二人多斡索和爾之子托諾依多克新額木尼克額爾克俱為厄魯特巴噶圖特和特竒喇古特四姓之衛喇特其得名多斡索和爾者因其印堂中有一眼能視三站之故伊弟兄二人經行布爾干噶勒圖納時其兄云自推朗噶嚕迪向通格里克呼嚕觀以西行走之一起逰牧将至車内有一俊雅女子可説為汝室二人向前詢問云係兩土黙特地方郭哩岱墨爾根之妻巴喇郭沁郭斡在阿哩克烏遜地方所生之女名阿掄郭斡尋路行走者遂訂與其弟多博墨爾根為妻生伯勒格特依伯衮徳依二子多博墨爾根卒後阿掄郭斡哈屯每夜夢一竒偉男子與之共寢天将明即起去因告伊妯娌及侍婢等知之如是者久之遂生布固哈塔吉博克多薩勒濟固勃端察爾等三子後漸長成有好事者譖之云從無寡婦生子之理其夫之連襟瑪哈賚常往來其家疑即此人伯勒格特依伯衮徳依二人遂疑其母阿掄郭斡哈屯因給伊子箭桿一枝命折之既折而擲之旋給五桿命一併折之竟不能折其母云爾等二人悞聴旁人之言疑我因語以夢中情事且云爾等此三弟殆天降之子也爾兄弟五人若不相和好各異其行即如前一枝箭以勢孤而被傷若公同而行即如後五枝箭勢衆則不能傷之矣由是和好後析産時僅給勃端察爾有迎鞍短尾銹鬃貉皮馬一匹外並未給與他物因惱恨四兄獨向鄂諾江東去見彼處有一青色鷹攫野鴨而食結套得鷹即放之而食其所獲之鴨結一茅廬棲止度日常於鄂郭爾察克一族人家尋飲奶漿後其兄伯勒格特依前來尋弟訪問彼衆告云爾弟每日來此飲奶漿伊将來時每每下雨爾姑待之語未畢天無片雲陣雨忽至四顧無人惟勃端察爾自荒郊而來弟兄遂會於其地即招服鄂郭爾察克人衆内一懐孕婦人勃端察爾娶為妻室名曰布丹由是布固哈塔吉以哈塔錦為氏博克多薩勒濟固以薩勒卓特為氏勃端察爾以博爾濟錦為氏布丹哈屯貌美前所孕之子名斡齊爾台遂以斡齊爾台為氏焉勃端察爾既娶布丹哈屯将伊所生之子命名為巴噶哩台汗之後裔哈必齊巴圖爾哈必齊之子名伯格爾巴圖爾伯格爾巴圖爾生瑪哈圗丹瑪哈圖丹生哈齊庫魯克哈齊庫魯克生星和爾多克新星和爾多克新生托木巴該徹辰托木巴該徹辰生哈布勒汗哈布勒汗生巴爾達木巴圖爾巴爾達木巴圖爾生伊蘇凱巴圖爾訥衮泰實孟格圖徹辰達哩岱諤濟錦等四人由是伊蘇凱巴圖爾攜訥衮泰什達哩岱諤濟錦二弟往落雪處尋覓天馬見一車轍内婦人溺痕以為此婦必生佳兒尋其蹤跡乃塔塔爾氏之伊克齊埒圖自鄂勒郭諾特地方娶妻烏格楞前來衆近前審視烏格楞向伊克齊埒圖云適纔三人内其年長之舉動曾看出否因脱所服襯衣囑云将此急與彼以遣之語未竟已逞强動手伊克齊埒圖敗走一齊尾追踰河三道遂擄烏格楞伊蘇凱巴圖爾以為己妻回家之際烏格楞哈屯且行且哭達哩岱諤濟錦等勸云過河三道踰山三重尋踹無蹤瞭望無跡呼之已不聞矣於是烏格楞哈屯呑聲前行即従前戊子嵗以來越三千二百九十五年嵗次壬午伊蘇凱巴圖爾之烏格楞哈屯生一子極靈秀為之卜名適遇特穆津遂命乳名曰天賜之特穆津云又生特穆津哈薩爾哈濟錦諤楚肯等四子併原配圖墨埒特郭斡阿巴海哈屯所生之伯克特爾伯勒格徳依二子弟兄共六人後伊蘇凱巴圖爾為特穆津求親前往伊舅氏鄂勒郭諾特逰牧途遇鴻吉喇特之岱徹辰問云却特之嫡派博爾濟錦氏親家何往伊蘇凱巴圖爾答云我為此子尋親而來岱徹辰云今我夜夢一白海青落我手中我卜之兆在爾博爾濟錦氏自古以來我家之俊雅女子作爾博爾濟錦氏之哈屯者最多今有女儀容甚美且命中應作爾博爾濟錦氏之哈屯我只生此一女名布爾徳甫九嵗即與爾此子為妻其父云年紀太小其子云終當成此一事可即成之於是舉觴為夀奉雙馬以為聘禮欵留特穆津伊蘇凱欲辭去正值塔塔爾族衆宴會之期衆邀云現備有餚饌食之再去切勿推却一併留住詎衆忽念及舊仇以毒藥攙入食物内食之伊蘇凱巴圖爾疾作急趨入親家室内云我在諸親眷房中食物甚甘不期中傷我特穆津何在可來前喚至遂令鴻郭丹之莽古里克照看遣回而伊蘇凱巴圖爾即卒原配哈屯亦相繼而卒後惟烏格楞哈屯隻身養育六子一日特穆津哈薩爾二子告其母云伯克特爾伯勒格徳依二人将我等所釣之魚奪而食之今日又将哈薩爾響箭射得之雀奪而食之意欲殺伊二人其母云爾等何以與從前岱齊果特之諤伯哷郭斡之五子一般議論爾等譬如影之隨形尾之在身不可離異兄弟相親相睦豈非長久友愛之道乎伊等掀簾走出由是四人遂與伯克特爾伯勒格徳依交惡伯克特爾云要殺我便殺切勿殺伯勒格徳依伊是日後給爾等出力之人不允遂致伯克特爾於死其母大怒斥責之曰吾愛惜保䕶養成将作名臣之子吾辛勤教誨養成将作賢臣之子向曾欣然期望何以如此互相殺害此後爾等其欲相殺相殘乎殆馳山之狗子歟殆囓胎之豺狼歟殆顧影自搏之海青歟殆掉尾自擊之鼠輩歟此與虺蝪奚異則復誰與爾等友愛者由是岱齊郭特之兵忽搆釁來攻云不侵犯爾等别人可将特穆津獻給特穆津聞之将弓搭箭正欲出拒被母拉住其箭落扣墜于坐側遂防守彼衆進攻路徑至第三日欲出時因馬鞍脱落云肚帶鬆扣則有之後鞦何以脱落此係天父止我又隔三日欲出時見一塊大白石阻路云向無此石盖天父用此止我又隔三日至九日後云此事何以處之正然瞭望之際被敵所獲縛以鐡鎖桎梏毎家輪流看守五月十五日乗岱齊郭特排設筵宴夜飲之際扭斷腿上鐡鎖擲守者之前逃出東西藏躱隠伏哈爾吉圖烏遜處蘇勒徳遜托爾干沙喇雖見之以為此子前曾與我齊拉衮秦拜二子交好此隠伏之人即便是伊我亦佯為我尋之状而已遂去特穆津以為此是一好心人乗夜逃至沙喇家齊拉衮秦拜二子云禽鳥求救且養之籠中况天命之博爾濟錦求救前來若不肯容納不加愛養日後與我等有何益處隨以斧壞其鎖藏匿于毳毛車内至次日逐户搜尋搜至托爾干沙喇家中欲搜其毳毛之車托爾干沙喇之女錫魯郭干哈塔干哭云為他人于此炎熱時苦刻自己之人耶其妻亦厲詞止之云似此夏日炎熱時如何将人藏於毳毛車内反疑惑自己之人乎其衆始罷去于是托爾干沙喇向特穆津云為爾㡬傷我家遂将白騍馬之鐙鬆放令其乗騎殺兩羊羔以為口糧遣之回特穆津至家與母及諸弟欣然相會至戊戌年特穆津年十七嵗布爾徳哈屯係丙戌年所生甫十三嵗遂爾匹配後岱齊郭特復來選取八匹黄騸馬竊之去特穆津遂乗伯勒格徳依捕獺所騎之黄馬循所踐草跡踹蹤而前遇阿爾拉特阿郭巴延之子博郭爾濟于牧塲博郭爾濟問云大却特苗裔博爾濟錦氏汗之子爾從何來答云日出時我湯黄騸馬被盜尋所踐草跡而來向爾阿郭巴延之子問詢博郭爾濟云向聞爾勤于奔走論丈夫本領我非平等今與汝同往自乗呼爾敦呼必之黒鬃黄馬将烏嚕克星呼拉之貉皮馬令特穆津乗騎相隨而去及昏覘知衆人團繞寢息博郭爾濟将欲乗夜潛進不識汗之子肯闌入與否遂問云我以爾係博爾濟錦之後裔是有福之人今日相隨前來為何游疑不斷二人遂一同闌入将八匹湯黄騸馬趕出直赴阿郭巴延家來阿郭巴延聞其子言相向而笑旋背而哭云丈夫本領相同甚勿棄置此人遂殺二羊羔贈為口糧遣回嗣是博郭爾濟扶助特穆津事無鉅細公同辦理特穆津年至二十八嵗嵗次己酉於克嚕倫河北郊即汗位前三日每清晨室前方石上有一五色鳥鳴云青吉斯青吉斯遂叶其祥號稱索多博克達青吉斯汗由是名揚於各處矣其石忽開裂内有一玉寶印方廣俱五寸許背為龜紐盤龍二條鐫有篆字即用是印鈐紙千張由是于鄂諾河上樹九斿白纛以肅軍容經行徳里衮布勒塔干地方樹揚威青色四斿纛君臨四十萬必塔人等降㫖云汝等疲於奔走従我服勤總攝有衆艱苦備嘗乃得休息爾如摩羅爾寶貝之畢塔人衆聴我指使共著勲勞俾我建中建極其庫克䝉古勒乎因號為庫克䝉古勒云是時正值哈薩爾汗與多羅干鴻和坦一同追趕岱齊令蘇伯格徳依巴圖爾帶兵前往汗降㫖訓示云錫以尊榮如纓冠之賁首結以理義若磐石之鞏固者乃我之臣工如金湯之扞衛如茂竹之森列者乃我之士卒爾等聴之嬉笑處應惜食指之招尤奮勉處應效兎鶻之搏擊戲要處宜鄙若蚊蠅戰陣處宜捷於鷹鸇蘇伯格徳依巴圖爾奏言願竭力奮勉其成與否惟主上之威福是賴遂起程前往蘇伯格徳依巴圖爾諫言於哈薩爾汗云骨月若分離則被旁人戕害損己之人而為他人擄獲動雖全得骨月不可得屬人雖可得弟兄不可得也哈薩爾汗然其言即來尋見隨兄聚處乃哈薩爾伯勒格徳依二人矜誇云汗禁止不軌征伐不義恃哈薩爾之射伯勒格徳依之强以保屬人以化暴戾今欲擒拏塔本翁格除我二人更有何人出力耶後被汗察知欲隠抑其少年之驕矜遂變作一屬下老人持一長角弓街市售賣哈薩爾伯勒格徳依一見即鄙薄之云老兒此弓除作打鳥之彈弓無並用處老者言汝二少年尚未試何得鄙之試則知之矣言訖冷笑伯勒格徳依不能扣弦老者扣弦付給哈薩爾接過亦不能開正看之際適見一鬚髮斑白之老人騎青線臉騾前來以此弓搭金哨子箭射之射裂一山峯歎云二少年肆言誇詐竟遜老夫一籌矣遂去二人念此非常人盖係主上之化身遂一意慎行後出兵收服曩古特之烏蘭昌貴三十一鄂托克人衆時汗與哈薩爾二人追趕鏖戰哈薩爾騎汗之賽音薩穆津貉皮馬有托克瑭阿巴圖爾台吉者将二人誘進賽音薩穆津貉皮馬被血染成赤兎發矢克敵收服烏蘭昌貴人衆俱服其技藝自是衛喇特布哩雅特投降供納廩給並将在大拜噶勒烏拉地方所獲之鴉鶻呈獻汗前而布哩雅特人衆亦内附矣嵗次庚戌年二十九嵗出放布哩雅特所獻鴉鶻自烏勒呼河至烏拉河適珠爾齊特之旺楚克汗背叛來追汗怒調兵往征因烏拉河無津不能渡托克瑭阿巴圖爾台吉之子安敦青台吉連結萬馬之轡呐喊前進渡海攻城上降㫖云如給萬燕千貓即不取城立時照數送給於是在其燕貓尾上拴結火繩㸃火撒放燕往屋内尋巢貓向房間竄跳城内各處漸漸火起用此計收服汗遂納旺楚克汗之女雅里海自彼旋轅雅里海哈屯已歿嵗次壬子年三十一嵗出兵烏訥根江以東地方因江水漲發上即在江邉屯駐遣使諭令納貢如不納貢則征之髙麗察罕汗懼進獻髙麗墨爾格特岱爾烏遜之女和蘭郭斡併以虎皮穹廬及布噶斯髙麗二鄂托克之人隨嫁于是收服察罕汗之三省髙麗在彼留駐三年布爾徳哈屯遣阿爾噶遜和爾齊往看和爾齊請安訖奏云布爾徳哈屯請汗安問侍御諸人并童幼等及汗之政治衆大臣好並奏言娑羅樹上有海青孚雛寄于樹間被花豹壞其巢卵雛俱傷葦塘中有鴻雁孚雛寄于蘆之陰卵雛俱被白爪所害可奏聞聖上上以為此喻甚是遂撤大兵回國降㫖云肇基之始所遇之大哈屯布爾徳福晉乃父母所聘結髮之妻後于征伐處收納之和蘭難見家中布爾徳福晉之面倘在衆屬人前發怒殊覺可恥可于九烏爾魯克内遣一人先往告知布爾徳福晉扎賚爾摩和賚情願前往先赴大哈屯布爾徳處叩頭奏言上有㫖云不守本業輕棄道統不聴大臣獻替之言棲止虎皮穹廬收服和蘭人衆因納和蘭哈屯布爾徳福晉賢徳哈屯降㫖云哈屯布爾徳伏思展闢疆土强大其國者在君上之威福其愛戴輔翼者惟人主之藻鑑葦塘中鴻雁雖多加之以强弓硬弩任君之意國中女子雖多其稟賦有福者君自察之豈在家久戀女子耶抑或不施控勒而騎生駒耶常言吉多則無凶灾少即是祥願汗尊軀堅固我婦人何為也摩和賚即來迎奏汗大喜甚然之駐宿金亭從彼旋轅時阿爾噶遜浩爾齊攜金胡琴竟夜駐宿他處汗使博郭爾濟摩和賚斬阿爾噶遜浩爾齊伊等即召阿爾噶遜速來次早攜酒兩瓶而來汗尚未起博郭爾濟在外奏言朝彩麗熙朝負辜人待理聖躬幸寤興伏望降明㫖玉殿含旭影金門祈早啟深尤俟睿斷懇布鴻慈矣汗乃起立召阿爾噶遜浩爾齊入尚未降㫖博郭爾濟摩和賚二人即以鞭責之阿爾噶遜奏言如窩藍鳥正得意啼鳴之際適值海青飛來之恐懼也命世之主𤼵威不勝惶恐之至自十嵗隨從未敢有放肆之處失於酒則有之實無惡心至二十嵗隨從未敢有欺誑之處過於飲則有之實無毒念汗以阿爾噶遜口出善言浩爾齊無虛假而出之以誠遂寛宥焉越時岱齊果特之布克齊勒格爾在屋中刨一穴上覆以氊片弟兄設宴來請詭云小人等従前無知向汝争競今見汝所向克成知是天命之聖主從前激之使怒今首先歸附幸勿追咎前罪祈降臨寒舍汗即欲往烏格楞哈屯諫言勿以敵兵之少而輕之勿以毒蛇之㣲而忽之須加防範汗然之命哈薩爾持櫜鞬坐侍伯勒格徳依相勢指示行事哈濟津照管馬匹烏濟錦相隨起坐伊遜烏爾魯克入室派兵三百九名在外周圍埋伏遂前往至彼入室汗欲坐氊中有智之烏濟錦引坐氊邉一婦人将汗所乗馬之鐙皮割斷攜去布克伯勒格徳依追及斷婦之足彼衆欲砍布克伯勒格徳依之肩岱齊果特之伏兵出戰善射之哈薩爾矢無虛發應弦而倒伊遜烏爾魯克等保䕶汗自左超乗科爾沁托克瑭阿台吉之銹鬃白騍馬遂擊敗彼衆盡行收服岱齊果特等之所以結怨者従前曾有承襲畢塔察干哈布勒汗之七子與承襲必塔斯干阿木拜汗之三子互相攻擊阿木拜汗之十子乗馬搶戰哈布勒汗之七子内弟兄六人被戕八部之畢塔人衆被掠巴爾達木巴圖爾等五人内三人受傷脱出是時巴爾達木巴圖爾之長子伊蘇凱巴圖爾年十三射一穿鐵甲之人仆地即乗其馬出而尋父而名賽音瑪喇勒哈雅克之婦人絜訥衮䝉格圖塔哩台三幼兒步行脱出自是失業之故也今将先世仇人擊敗收獲振旅而還陞坐亭内忽見穹廬頂上有一玉碗盛竒香異味之酒滿而不溢降至汗手内汗獨飲之四弟言天恩豈可獨享也汗然之即将所餘遞給四人雖飲入口竟不能咽奏言此天父玉皇上帝賜聖天子寶貝碗以盛甘露也前言誤矣汝乃命世主可行政治我等隨行可也汗降㫖云天命在我從前塞北稱君即得玉璽今甫降服舊仇上天即降甘露由此觀之爾等所言是也嵗次癸丑年三十二嵗聘塔塔爾部伊克綽囉之女濟蘇哈屯濟蘇凱哈屯姊妹二人為妃自是汗率庫期大兵滅金主而建業焉嵗次甲寅年三十三嵗據有烏蘭烏魯斯中國十三省八十餘萬户民人之地稱號岱明索多博克達青吉斯汗其代金主建業之聲聞互相𫝊播土伯特地方之錫都爾固汗巴延薩爾塔固爾之子多爾通聞之甚懼遣使奏言願納貢賦以為右翼汗許諾厚賞而遣之其使住宿岱齊雅布噶之家夜坐談論告以汝汗誠天子也奈哈屯等不佳我之古爾伯勒津郭斡哈屯面色光瑩夜不須燭其雅布噶之妻䝉郭倫郭斡曾侍哈屯從汗於行在故雅布噶聞是語宻奏云錫都爾固汗之妻錫魯衮古爾伯勒津郭斡哈屯面色美麗明並日月殆皇天所寵錫主上請收之後遣使於土伯特之錫都爾固汗云朕今用兵於薩爾塔郭勒汝右翼其率兵前來錫都爾固汗答云各國雖未盡兼倂汗乃百獸中之猛獅豪傑中之聖主之二者無須資助汗於是大怒誓之曰此命不亡終不恕彼天父鑒之鴻吉喇特之斡齊爾徹辰奏言汗何不諭之曰生子至於成立鐙鐵至於殘壞終必及之奈何輕至尊之身與之發誓願汗夀域永固元兇盡滅臣民豐裕徳望綿逺嵗次乙夘年三十四歲用兵於薩爾塔郭勒薩爾塔郭勒之扎里雅特蘇勒徳汗迎戰於薩噶哩塔爾巴噶台地方彼時有蘇尼特之吉魯根巴圖爾莽努特之貴里達爾和碩齊等二人引戰遂殺扎里雅特之蘇勒徳汗據有五部之沙喇薩爾塔郭勒人衆嵗次丙辰年三十五嵗進兵托克摩克有號博克達達哈蘇魯克徳格哷托克摩克之莽古里克蘇勒徳汗者前來迎戰于是珠爾齊特之蘇伯格特依巴圖爾珠勒根之楚勒吉台巴圖爾等二人引戰遂斬莽古里克蘇勒徳汗據有托克摩克之衆嵗次戊午年三十七嵗遣使於克哩葉特之翁汗言前取布爾徳大哈屯時事之如父曾以貂裘為獻今朕調劑庶政統一治道願如父子相親翁汗不信率克哩葉特之衆興兵前來迎戰於鄂諾河下游呼倫貝爾地方彼時有衛喇特之都嚕勒濟台什烏梁罕之濟勒墨諾延蘇尼特古里根之子湍台察爾必等三人首先轉戰遂降翁汗據克里葉特之衆嵗次庚申年三十九嵗用兵於奈曼之圖們汗命必塔錦将八萬兵往取達延汗奈曼之鄂拓克令且迎且守期會于河上彼時有烏古新之博囉郭勒諾延阿嚕拉特之博郭爾濟之子諤古倫察爾必鄂勒固諾特之呼濟爾達什等三人先将達延汗逐出遂據奈曼之衆嵗次壬戌年四十一嵗用兵於郭爾羅斯郭爾羅斯之納琳汗率二十萬郭爾羅斯前來迎戰於克哩葉庫卜克爾地方彼時有哈薩爾諾延鴻吉喇特之斡齊爾徹辰曩古特之圖克徳庫和濟歡巴雅固特之烏里阿克塔等四人進戰生擒納琳汗遂據郭爾羅斯之衆嵗次甲子年四十三嵗哈爾里固特之阿爾薩蘭汗甚驕縦揚言曰汗博克達特穆津用兵於各處斷無不來我之疆域者常言大丈夫生於家庭死於原野遂率兵前來上聞之迎戰於薩喇格古勒地方彼時有扎賚爾之孟郭里諾延塔塔爾之錫吉呼圖克蘇勒徳遜咱木拜達爾罕郭爾羅斯之圖們諾延徹辰伯竒斡齊掄扎穆噶等五人進戰遂斬阿爾薩蘭汗據有其衆嵗次丙寅年四十五嵗用兵於土伯特之古魯格多爾濟汗彼時土伯特汗遣尼魯呼諾延為使率三百人前來進獻駝隻輜重無算會于柴達木疆域汗嘉予之遂大賚其汗及使臣而遣之上因致書併贄儀於薩嘉察克羅咱斡阿難達噶爾貝喇嘛云尼魯呼諾延之還也即欲聘請喇嘛但朕辦理世事未暇聘請願遥申皈依之誠仰懇䕶佑之力由是收服阿哩三部屬八十萬土伯特人衆遂進征額訥特珂克直抵齊塔納凌嶺之山脊遇一獨角獸名曰塞嚕奔至汗前三屈其膝而叩衆皆駭異上諭之曰彼額訥特珂克之斡齊爾圖薩固琳者乃古昔降生佛菩薩大聖人之地今此不能言語之獸類乃肖人叩拜者其故何㦲我等若到極至之處不知又當何如此盖朕之天父藉此以示禁歟遂振旅而還遣使諭令薩爾塔克沁之諳巴海汗令輸誠納貢其汗不従屛使臣而拒之曰安居之衆乃加以强擄遂肆意而行耶我諳巴海不畏强侮何有於茍且安居耶遂遣還汗大怒曰諺有之出大言者招損朕承天父之命曾敗十二强汗以期國治民安今彼如此大言天父鑑之嵗次戊辰年四十七嵗用兵於諳巴海汗諳巴海汗率兵十萬迎戰於拜噶勒江地方格鬬三朝上躬自督兵維時阿喇拉特之博郭爾濟諾延扎賚爾之䝉郭里諾延蘇尼特之吉魯根莽努特之貴里達爾和錫果齊台等争先進戰大敗之斬諳巴海盡降其所屬遂撤薩爾塔克沁之大兵焉汗以伊遜烏爾魯克以下効力有名人衆俱為國効力著有勲勞編次美號顯爵重賞厚祿以施恩行賞至于百千萬億皆作諾延並大賚所屬大國亦復如是而弗及于博郭爾濟諾延夜晚當入息時已飭博郭勒巴沁迨入息布爾徳福晉徹辰索台哈屯在寢室曰汝途窮之時扶持交結掃除僭亂成汝大事奮不惜命者得非博郭爾濟乎明主人君普恵澤於大衆彼勞績宣著効力出衆之博郭爾濟奈何忘之汗曰朕非忘之欲使忌妬者知博郭爾濟之徳也諭近侍博郭勒巴沁曰汝往覘之彼㫁不怨朕殆安居好言以待之耳遂遣博郭勒巴沁前往伊妻特古斯懇郭斡云遇於未興之前竭力輔政成其萬難之事我等効力過於衆人汝忘生身父母抛去妻子不分爾我効力於汗汝以為今雖勞苦終可安樂今主上施恩衆屬賞逾千萬而並未提及爾博郭爾濟此輩之効力於博爾濟錦者非由爾之指示乎博郭爾濟答曰飲食則無事貪饕䕶衛則期于盡力雖未得一體受恩不必懐怨惟竊自贊助宣力効勞是圖爾量淺婦人所見者短我汗尊軀永固據此大寶一統太平當時雖不加恩于我必施及後嗣子孫無須急切怨望益當奮勉効力汗盖試我耳㫁不忘我此必别有深意也博郭勒巴沁将此悉行奏聞汗曰朕不云乎伊従前曾出衆効力今無分隠顯出言肫誠不移不似尋常人等少懐嫉妒之心明日将博郭爾濟如此之徳宣諭於衆大施恩賞至次日集衆屬降㫖曰曩昔朕施恩賞衆遺忘博郭爾濟至晚布爾徳福晉哈屯坐談怨朕有近侍過博郭爾濟之家将博郭爾濟特古斯懇二人坐談之語悉皆奏朕遂述博郭爾濟夫妻二人問答之言且曰股皮撒袋至于破壞而仍出好言者博郭爾濟是也扶持顛危而終懐好意不貳其心者博郭爾濟是也有毛撒袋至於朽爛而分外効勞者博郭爾濟是也舍死鏖戰奮勇不惜身命者博郭爾濟是也今伊遜烏爾魯克等大臣官員至於衆人爾等勿生忌妬似此出衆効力之人若不重賞則阻将來報効之路博郭爾濟首先遇合宣力効勞朕将施恩重賞以旌異於衆衆大臣官員奏云頃䝉汗寵錫並不提及博郭爾濟盖汗之明有意存焉以此觀之良有以也我等何敢忌妬此㫖非所以愛我衆人也汗曰其賜號為内而扶助朕之大統外而據有塔本翁格之衆董率震動山岳師旅之九部落諾延庫魯克博郭爾濟其妻特古斯懇郭斡賜號曰太夫人封博郭爾濟為伊遜烏爾魯克之長九部落之諾延欽定䝉古源流卷三
